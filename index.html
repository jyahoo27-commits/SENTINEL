          <!-- Главный тормозной цилиндр / бачок -->
          <rect x="155" y="190" width="40" height="30" rx="6" fill="rgba(50,20,20,.5)" stroke="rgba(200,60,60,.3)" stroke-width="1.2"/>
          <text x="175" y="207" text-anchor="middle" fill="rgba(200,60,60,.5)" font-size="7" font-family="Segoe UI,sans-serif">ТОРМ.Ж.</text>
          <!-- Выпускной коллектор снизу ДВС -->
          <path d="M55 195 Q95 202 105 215 Q115 225 120 240" fill="none" stroke="rgba(255,130,30,.4)" stroke-width="2.5"/>
          <text x="90" y="255" text-anchor="middle" fill="rgba(255,130,30,.3)" font-size="7.5" font-family="Segoe UI,sans-serif">→ Выхлоп</text>
          <!-- Лямбда-зонд -->
          <circle cx="113" cy="228" r="6" fill="rgba(255,160,30,.15)" stroke="rgba(255,160,30,.4)" stroke-width="1"/>
          <!-- АКБ реальная позиция — левее КПП спереди -->
        `;

      // ─ Вид СНИЗУ ─────────────────────────────────────────────
      } else {
        body = `
          <defs>
            <linearGradient id="floor-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#0e1825" stop-opacity=".95"/>
              <stop offset="100%" stop-color="#080e18" stop-opacity=".9"/>
            </linearGradient>
          </defs>
          <!-- Подкузовное пространство -->
          <path d="M50 22 Q38 28 34 55 L32 95 L32 340 Q33 368 50 378 L170 378 Q187 368 188 340 L188 95 L186 55 Q182 28 170 22 Z" fill="url(#floor-grad)" stroke="rgba(0,255,255,.2)" stroke-width="1.5"/>
          <!-- Передний подрамник (MacPherson стойки) -->
          <rect x="45" y="55" width="130" height="30" rx="6" fill="rgba(30,50,80,.5)" stroke="rgba(0,255,255,.2)" stroke-width="1"/>
          <text x="110" y="74" text-anchor="middle" fill="rgba(0,255,255,.3)" font-size="7.5" font-family="Segoe UI,sans-serif">ПЕРЕДНИЙ ПОДРАМНИК</text>
          <!-- Стойки MacPherson (линии от кузова к ступице) -->
          <line x1="50" y1="60" x2="38" y2="120" stroke="rgba(0,255,255,.25)" stroke-width="2"/>
          <line x1="170" y1="60" x2="182" y2="120" stroke="rgba(0,255,255,.25)" stroke-width="2"/>
          <!-- Поперечные рычаги передней подвески -->
          <line x1="38" y1="130" x2="58" y2="125" stroke="rgba(0,255,255,.22)" stroke-width="1.8"/>
          <line x1="182" y1="130" x2="162" y2="125" stroke="rgba(0,255,255,.22)" stroke-width="1.8"/>
          <!-- Полуоси передние -->
          <line x1="45" y1="140" x2="100" y2="125" stroke="rgba(100,180,255,.3)" stroke-width="2.2"/>
          <line x1="175" y1="140" x2="120" y2="125" stroke="rgba(100,180,255,.3)" stroke-width="2.2"/>
          <!-- КПП / двигатель (вид снизу) -->
          <rect x="60" y="82" width="100" height="65" rx="8" fill="rgba(20,40,65,.7)" stroke="rgba(0,255,255,.2)" stroke-width="1.2"/>
          <text x="110" y="108" text-anchor="middle" fill="rgba(0,255,255,.3)" font-size="7.5" font-family="Segoe UI,sans-serif">ДВИГАТЕЛЬ (снизу)</text>
          <text x="110" y="120" text-anchor="middle" fill="rgba(0,255,255,.2)" font-size="7" font-family="Segoe UI,sans-serif">Поддон · картер</text>
          <!-- Маслосливная пробка -->
          <circle cx="102" cy="138" r="6" fill="rgba(200,140,0,.2)" stroke="rgba(200,140,0,.4)" stroke-width="1"/>
          <text x="102" y="152" text-anchor="middle" fill="rgba(200,140,0,.35)" font-size="6.5" font-family="Segoe UI,sans-serif">слив</text>
          <!-- Стабилизатор поперечной устойчивости -->
          <path d="M38 165 Q75 155 110 158 Q145 155 182 165" fill="none" stroke="rgba(100,180,255,.35)" stroke-width="2.5"/>
          <text x="110" y="153" text-anchor="middle" fill="rgba(100,180,255,.3)" font-size="7" font-family="Segoe UI,sans-serif">стабилизатор</text>
          <!-- Задняя балка (торсионная — характерно для 206) -->
          <path d="M38 300 Q55 310 110 308 Q165 310 182 300" fill="none" stroke="rgba(0,200,200,.3)" stroke-width="3"/>
          <text x="110" y="322" text-anchor="middle" fill="rgba(0,200,200,.3)" font-size="7.5" font-family="Segoe UI,sans-serif">ТОРСИОННАЯ БАЛКА</text>
          <!-- Задние колёса (ось) -->
          <line x1="36" y1="325" x2="184" y2="325" stroke="rgba(0,255,255,.12)" stroke-width="1.5" stroke-dasharray="4,3"/>
          <!-- Выхлопная система -->
          <path d="M105 148 L110 200 L115 265 Q116 285 122 310 L124 360" fill="none" stroke="rgba(255,140,30,.5)" stroke-width="2.5"/>
          <!-- Глушитель -->
          <ellipse cx="124" cy="350" rx="16" ry="10" fill="rgba(50,50,50,.8)" stroke="rgba(255,140,30,.45)" stroke-width="1.2"/>
          <text x="124" y="370" text-anchor="middle" fill="rgba(255,140,30,.4)" font-size="7" font-family="Segoe UI,sans-serif">глушитель</text>
          <!-- Топливный бак — сзади между осью и задним бампером -->
          <rect x="68" y="300" width="84" height="38" rx="8" fill="rgba(50,40,15,.6)" stroke="rgba(200,180,30,.3)" stroke-width="1.2"/>
          <text x="110" y="323" text-anchor="middle" fill="rgba(200,180,30,.35)" font-size="7.5" font-family="Segoe UI,sans-serif">ТОПЛИВНЫЙ БАК</text>
          <!-- Тросы ручного тормоза -->
          <line x1="38" y1="325" x2="108" y2="295" stroke="rgba(160,160,160,.25)" stroke-width="1.2" stroke-dasharray="3,3"/>
          <line x1="182" y1="325" x2="112" y2="295" stroke="rgba(160,160,160,.25)" stroke-width="1.2" stroke-dasharray="3,3"/>
          <!-- Подписи колёс -->
          <text x="22" y="140" fill="rgba(0,255,255,.3)" font-size="7" font-family="Segoe UI,sans-serif" transform="rotate(-90,22,140)" text-anchor="middle">ЛЕВО</text>
          <text x="198" y="140" fill="rgba(0,255,255,.3)" font-size="7" font-family="Segoe UI,sans-serif" transform="rotate(90,198,140)" text-anchor="middle">ПРАВО</text>
          <text x="110" y="18" text-anchor="middle" fill="rgba(0,255,255,.5)" font-size="8.5" font-family="Segoe UI,sans-serif" font-weight="700" letter-spacing="1">ПЕРЕД</text>
          <text x="110" y="408" text-anchor="middle" fill="rgba(0,255,255,.35)" font-size="8.5" font-family="Segoe UI,sans-serif" font-weight="700" letter-spacing="1">ЗАД</text>
          <!-- Передние колёса (вид снизу) -->
          <ellipse cx="35" cy="120" rx="13" ry="25" fill="rgba(30,40,55,.9)" stroke="rgba(0,255,255,.5)" stroke-width="1.5"/>
          <ellipse cx="35" cy="120" rx="7" ry="15" fill="none" stroke="rgba(0,255,255,.25)" stroke-width="1"/>
          <ellipse cx="185" cy="120" rx="13" ry="25" fill="rgba(30,40,55,.9)" stroke="rgba(0,255,255,.5)" stroke-width="1.5"/>
          <ellipse cx="185" cy="120" rx="7" ry="15" fill="none" stroke="rgba(0,255,255,.25)" stroke-width="1"/>
          <!-- Задние колёса -->
          <ellipse cx="35" cy="325" rx="13" ry="25" fill="rgba(30,40,55,.9)" stroke="rgba(0,255,255,.4)" stroke-width="1.5"/>
          <ellipse cx="35" cy="325" rx="7" ry="15" fill="none" stroke="rgba(0,255,255,.2)" stroke-width="1"/>
          <ellipse cx="185" cy="325" rx="13" ry="25" fill="rgba(30,40,55,.9)" stroke="rgba(0,255,255,.4)" stroke-width="1.5"/>
          <ellipse cx="185" cy="325" rx="7" ry="15" fill="none" stroke="rgba(0,255,255,.2)" stroke-width="1"/>
        `;
      }

      // ── Хотспоты текущего вида ──
      let dots = '';
      HS.filter(h=>h[4]===view).forEach(([key,cx,cy,lbl]) => {
        const st = statusMap2[key];
        if (!st) return;
        const col = st.color;
        const isRed = col==='#ff4d4d';
        const isOra = col==='#ffa040';
        const glowId = isRed ? 'glow-r' : isOra ? 'glow-y' : '';
        const pulse = isRed ? `<animate attributeName="r" values="9;11;9" dur="1.4s" repeatCount="indefinite"/>` : '';
        dots += `<g class="sv-hs" data-key="${key}" data-lbl="${lbl}" data-view="${view}" ${glowId?`filter="url(#${glowId})"`:''}">
          <circle class="outer" cx="${cx}" cy="${cy}" r="11" fill="${col}" fill-opacity=".18" stroke="none"/>
          <circle cx="${cx}" cy="${cy}" r="8" fill="${col}" fill-opacity=".8" stroke="${col}" stroke-width="1.5">${pulse}</circle>
          <circle cx="${cx}" cy="${cy}" r="4" fill="rgba(255,255,255,.6)"/>
          <text x="${cx}" y="${cy+20}" text-anchor="middle" font-size="7.5" font-family="Segoe UI,sans-serif" fill="rgba(200,220,235,.75)" pointer-events="none">${lbl}</text>
        </g>`;
      });

      return `<svg viewBox="0 0 220 ${H}" xmlns="http://www.w3.org/2000/svg" style="max-height:460px">${body}${dots}</svg>`;
    }

    // ── Сборка карточки ──
    const viewLabels = { top:'🔭 Сверху', hood:'🔧 Капот', bottom:'⬇ Снизу' };
    let activeView = 'top';

    const tabBar = document.createElement('div'); tabBar.className='sv-tabs';
    const svgWrap = document.createElement('div'); svgWrap.className='sv-wrap';
    const tooltip = document.createElement('div'); tooltip.className='sv-tooltip'; tooltip.id='sv-tt';
    svgWrap.appendChild(tooltip);
    const legend = document.createElement('div'); legend.className='sv-legend';
    legend.innerHTML=`
      <span><i style="background:#0ff"></i>Норма</span>
      <span><i style="background:#ffa040"></i>Внимание</span>
      <span><i style="background:#ff4d4d"></i>Критично</span>
      <span style="font-size:9px;color:rgba(0,255,255,.35);margin-left:4px">Нажми на точку для деталей</span>
    `;

    ['top','hood','bottom'].forEach(v=>{
      const btn=document.createElement('button');
      btn.className='sv-tab'+(v==='top'?' on':'');
      btn.textContent=viewLabels[v];
      btn.onclick=()=>{
        activeView=v;
        tabBar.querySelectorAll('.sv-tab').forEach(b=>b.classList.toggle('on',b===btn));
        svgWrap.querySelector('svg').outerHTML; // placeholder
        const existing=svgWrap.querySelector('svg');
        if(existing) existing.remove();
        const dummy=document.createElement('div');
        dummy.innerHTML=buildSVG(v);
        svgWrap.insertBefore(dummy.firstChild, tooltip);
        bindHotspots();
        tooltip.classList.remove('show');
      };
      tabBar.appendChild(btn);
    });

    // Первый рендер
    const initDiv=document.createElement('div');
    initDiv.innerHTML=buildSVG('top');
    svgWrap.insertBefore(initDiv.firstChild, tooltip);

    schCard.appendChild(tabBar);
    schCard.appendChild(svgWrap);
    schCard.appendChild(legend);
    c.appendChild(schCard);

    // ── Обработка тапов/кликов на хотспоты ──
    function bindHotspots(){
      svgWrap.querySelectorAll('.sv-hs').forEach(g=>{
        g.onclick=(e)=>{
          const key=g.dataset.key;
          const st=statusMap2[key];
          if(!st){ tooltip.classList.remove('show'); return; }
          const r=svgWrap.getBoundingClientRect();
          const gBox=g.getBoundingClientRect();
          let tx=gBox.left-r.left+20, ty=gBox.top-r.top-10;
          if(tx+240>r.width) tx=r.width-240;
          if(ty<0) ty=0;

          const pctLine = st.condOnly
            ? `<div class="sv-tt-row"><span>Статус</span><b style="color:${st.color}">${st.statusText}</b></div>`
            : `<div class="sv-tt-row"><span>Износ</span><b style="color:${st.color}">${st.pct.toFixed(0)}%</b></div>
               <div class="sv-tt-row"><span>Осталось</span><b>${st.rem>0?fmtI(st.rem)+' км':'⚠ Просрочено'}</b></div>
               <div class="sv-tt-row"><span>Каждые</span><b>${fmtI(st.km)} км</b></div>`;
          const lastLine = st.lastKm>0
            ? `<div class="sv-tt-row"><span>Последнее</span><b>${fmtI(st.lastKm)} км</b></div>` : '';

          tooltip.innerHTML=`
            <div class="sv-tt-name" style="color:${st.color}">${st.label}</div>
            ${pctLine}${lastLine}
            ${st.notes?`<div style="margin-top:6px;font-size:10px;color:#7a9aaa;border-top:1px solid rgba(255,255,255,.07);padding-top:5px">${st.notes}</div>`:''}
          `;
          tooltip.style.left=tx+'px';
          tooltip.style.top=ty+'px';
          tooltip.classList.add('show');
          e.stopPropagation();
        };
      });
    }
    bindHotspots();

    // Закрыть тултип при тапе мимо
    svgWrap.addEventListener('click', e=>{ if(!e.target.closest('.sv-hs')) tooltip.classList.remove('show'); });

    // Wear intervals card
    const wc=this._card();
    wc.innerHTML='<div class="card-title">Прогноз обслуживания</div>';
    items.forEach(it=>{
      const div=document.createElement('div'); div.className='wear-row';
      const critClass=(it.crit||it.criticality)==='critical'?'crit':(it.crit||it.criticality)==='warning'?'warn':'info';
      const critLbl={critical:'КРИТ',warning:'ВНМ',info:'ОК'}[it.crit||it.criticality]||'ОК';
      const condOnly=isCondOnly(it);
      if(condOnly){
        const cs=it.conditionStatus||'ok';
        const pctMap={ok:0,watch:35,replace:70,critical:100};
        div.innerHTML=`<div class="wear-lbl"><span><span class="pill ${critClass}">${critLbl}</span>${it.label}</span>
          <select class="cond-sel" style="background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.12);border-radius:7px;color:${cCol(cs)};font-size:10px;padding:3px 7px;cursor:pointer;outline:none;width:auto">
            <option value="ok" ${cs==='ok'?'selected':''}>Норма</option>
            <option value="watch" ${cs==='watch'?'selected':''}>Наблюдение</option>
            <option value="replace" ${cs==='replace'?'selected':''}>Заменить</option>
            <option value="critical" ${cs==='critical'?'selected':''}>Критично!</option>
          </select></div>
          <div class="wear-bar"><div class="wear-fill" style="width:${pctMap[cs]||0}%;background:${cCol(cs)}"></div></div>
          ${it.notes?`<div class="svc-notes">${it.notes}</div>`:''}`;
        div.querySelector('.cond-sel').onchange=async e=>{
          await this.db.set(S.SVC,{...it,conditionStatus:e.target.value,condOnly:true,conditionOnly:true});
          e.target.style.color=cCol(e.target.value);
        };
      } else {
        const done=Math.max(0,odo-it.lastServiceOdo);
        const pct=it.km>0?Math.min(100,(done/it.km)*100):0;
        const rem=Math.max(0,it.km-done);
        const col=wCol(pct);
        const eta=avgDay>0&&rem>0?dStr(new Date(Date.now()+(rem/avgDay)*86400000)):'—';
        div.innerHTML=`<div class="wear-lbl"><span><span class="pill ${critClass}">${critLbl}</span>${it.label}</span><span style="color:${col};font-weight:700">${pct.toFixed(0)}%</span></div>
          <div class="wear-bar"><div class="wear-fill" style="width:${pct}%;background:${col}"></div></div>
          ${it.notes?`<div class="svc-notes">${it.notes}</div>`:''}
          <div style="font-size:10px;color:var(--muted);margin-top:3px">каждые ${fmtI(it.km)} км · ост. ${fmtI(rem)} км · ~${eta}${it.lastServiceOdo?' · при '+fmtI(it.lastServiceOdo)+' км':''}</div>`;
      }
      wc.appendChild(div);
    });
    c.appendChild(wc);

    // Add service record
    const sc=this._card();
    const itemOpts=items.filter(it=>!isCondOnly(it)).map(it=>`<option value="${it.id}">${it.label}</option>`).join('');
    sc.innerHTML=`<div class="card-title">Записать ТО / работу</div>
      <div class="ig"><label class="lbl">Работа</label><select id="svc-it">${itemOpts}<option value="other">Другое…</option></select></div>
      <div class="g2">
        <div class="ig"><label class="lbl">Пробег (км)</label><input type="number" id="svc-o" value="${odo}"></div>
        <div class="ig"><label class="lbl">Стоимость (₽)</label><input type="number" id="svc-c" placeholder="0"></div>
      </div>
      <div class="g2">
        <div class="ig"><label class="lbl">Дата</label><input type="date" id="svc-d" value="${today()}"></div>
        <div class="ig"><label class="lbl">Комментарий</label><input type="text" id="svc-n" placeholder="Что сделано"></div>
      </div>
      <button class="btn c full" id="svc-add">Записать в журнал</button>`;
    c.appendChild(sc);
    sc.querySelector('#svc-add').onclick=async()=>{
      const itemId=parseInt(sc.querySelector('#svc-it').value);
      const svcOdo=parseFloat(sc.querySelector('#svc-o').value);
      const cost=parseFloat(sc.querySelector('#svc-c').value)||0;
      const comment=sc.querySelector('#svc-n').value.trim();
      const dt=sc.querySelector('#svc-d').value||today();
      if(isNaN(svcOdo)) return;
      const selItem=items.find(it=>it.id===itemId);
      const label=selItem?selItem.label:'Другое';
      await this.db.add(S.GARAGE,{type:selItem?.key||'other',label,odometer:svcOdo,cost,comment,date:new Date(dt+'T12:00:00').toISOString()});
      if(selItem) await this.db.set(S.SVC,{...selItem,lastServiceOdo:svcOdo,conditionStatus:'ok'});
      if(cost>0){
        const bal=await this.db.cfg('balance');
        await this.db.setCfg('balance',bal-cost);
        await this.db.add(S.TX,{amount:cost,type:'expense',category:'Авто',comment:label+(comment?' · '+comment:''),date:new Date(dt+'T12:00:00').toISOString()});
      }
      this._render();
    };

    // Logs
    const logs=(await this.db.all(S.GARAGE)).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,15);
    const jc=this._card();
    jc.innerHTML='<div class="card-title">Журнал обслуживания</div>';
    if(!logs.length){jc.insertAdjacentHTML('beforeend','<div style="color:var(--muted);text-align:center;padding:16px">Нет записей</div>');}
    else logs.forEach(log=>{
      const row=document.createElement('div'); row.className='log-row';
      const del=document.createElement('button'); del.className='del-btn'; del.textContent='×';
      row.innerHTML=`<div style="min-width:0;flex:1"><span class="badge">${log.label}</span><div class="log-meta">${dStr(log.date)} · ${fmtI(log.odometer)} км${log.comment?' · '+log.comment:''}</div></div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">${log.cost?`<span style="color:var(--orange);font-size:12px;font-weight:700">−${fmt(log.cost)} ₽</span>`:''}</div>`;
      row.querySelector('div:last-child').appendChild(del);
      del.onclick=()=>confirmDel(del,async()=>{del._ok=true;await this.db.del(S.GARAGE,log.id);if(log.cost>0){const bal=await this.db.cfg('balance');await this.db.setCfg('balance',bal+log.cost);}this._render();});
      jc.appendChild(row);
    });
    c.appendChild(jc);

    // Parts notes
    const ac=this._card();
    ac.innerHTML=`<div class="card-title">Артикулы и заметки</div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:8px">Запиши артикулы масла, фильтров, свечей — чтобы не гуглить перед ТО</div>
      <textarea id="parts-n" placeholder="Масло: Castrol 5W-30&#10;Фильтр: MANN W712/75&#10;Свечи: NGK BPR5E&#10;...">${partsNotes||''}</textarea>
      <button class="btn c full" id="parts-s">Сохранить</button>`;
    c.appendChild(ac);
    ac.querySelector('#parts-s').onclick=async()=>{
      await this.db.setCfg('carPartsNotes',ac.querySelector('#parts-n').value);
      const f=document.createElement('div');f.textContent='✓ Сохранено';f.style.cssText='color:var(--green);font-size:11px;margin-top:6px';
      ac.appendChild(f);setTimeout(()=>f.remove(),2000);
    };
  }

  /* ═══════ 3D PRINT ═══════ */
  async _print(c){
    const hr=await this.db.cfg('printHourRate');
    const sf=await this.db.cfg('printSetupFee');
    const mp=await this.db.cfg('printMinPrice');

    const paramCard=this._card();
    paramCard.innerHTML=`<div class="card-title">Параметры расчёта</div>
      <div class="g3">
        <div class="ig"><label class="lbl">₽/ч работы</label><input type="number" id="pr-r" value="${hr}"></div>
        <div class="ig"><label class="lbl">Подготовка (₽)</label><input type="number" id="pr-f" value="${sf}"></div>
        <div class="ig"><label class="lbl">Минималка (₽)</label><input type="number" id="pr-m" value="${mp}"></div>
      </div>
      <button class="btn v full" id="pr-save">Сохранить</button>`;
    c.appendChild(paramCard);
    paramCard.querySelector('#pr-save').onclick=async()=>{
      await this.db.setCfg('printHourRate',parseFloat(paramCard.querySelector('#pr-r').value)||hr);
      await this.db.setCfg('printSetupFee',parseFloat(paramCard.querySelector('#pr-f').value)||sf);
      await this.db.setCfg('printMinPrice',parseFloat(paramCard.querySelector('#pr-m').value)||mp);
      const f=document.createElement('div');f.textContent='✓ Сохранено';f.style.cssText='color:var(--green);font-size:11px;margin-top:6px';paramCard.appendChild(f);
      setTimeout(()=>f.remove(),700);
    };

    const cc=this._card();
    cc.innerHTML=`<div class="card-title">Калькулятор заказа</div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:10px;line-height:1.6">≤50г: Вес×коэф | >50г стандарт: (Ч×${hr})+(Вес×5)+${sf} | TPU: +Вес×10 | Композит: +Вес×20</div>
      <div class="ig"><label class="lbl">Тип материала</label>
        <select id="c-mat"><option value="standard">PLA / PETG / ABS — Стандарт</option><option value="flex">TPU / Flex — Гибкий</option><option value="composite">Carbon / Glass — Композит</option></select>
      </div>
      <div class="g2">
        <div class="ig"><label class="lbl">Вес модели (г)</label><input type="number" id="c-wg" placeholder="150"></div>
        <div class="ig"><label class="lbl">Время печати (ч)</label><input type="number" id="c-th" placeholder="4.5"></div>
      </div>
      <div class="ig"><label class="lbl">Название заказа</label><input type="text" id="c-desc" placeholder="Описание детали"></div>
      <button class="btn c full" id="c-calc">Рассчитать цену</button>
      <div id="c-res" style="display:none;margin-top:12px"></div>`;
    c.appendChild(cc);
    let lastTotal=0;
    cc.querySelector('#c-calc').onclick=()=>{
      const wg=parseFloat(cc.querySelector('#c-wg').value);
      const th=parseFloat(cc.querySelector('#c-th').value)||0;
      const mat=cc.querySelector('#c-mat').value;
      const res=cc.querySelector('#c-res'); res.style.display='block';
      if(!wg||wg<=0){res.innerHTML='<div style="color:var(--red)">Введи вес модели</div>';return;}
      if(wg>50&&th<=0){res.innerHTML='<div style="color:var(--orange)">Для >50г укажи время из слайсера</div>';return;}
      const {price,formula,breakdown}=calc3DPrice(wg,th,mat,hr,sf,mp);
      lastTotal=price;
      res.innerHTML=`<div class="calc-result">
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px">${wg}г${th?' · '+th+'ч':''} · формула: ${formula}</div>
        ${breakdown.map(b=>`<div>${b}</div>`).join('')}
        <div class="calc-total">Итого: ${fmt(price)} ₽</div>
      </div>
      <button class="btn g full" id="c-inc">→ Зачислить как доход</button>`;
      res.querySelector('#c-inc').onclick=async()=>{
        if(lastTotal<=0) return;
        const desc=cc.querySelector('#c-desc').value.trim()||'3D-печать';
        await this.db.add(S.TX,{amount:lastTotal,type:'income',category:'3D-печать',comment:`${desc} · ${wg}г${th?' · '+th+'ч':''}`,date:new Date().toISOString()});
        const bal=await this.db.cfg('balance');
        await this.db.setCfg('balance',bal+lastTotal);
        res.insertAdjacentHTML('beforeend',`<div style="color:var(--green);font-size:11px;margin-top:8px">✓ ${fmt(lastTotal)} ₽ добавлено в баланс</div>`);
        res.querySelector('#c-inc').disabled=true; lastTotal=0;
      };
    };

    const pTxs=(await this.db.all(S.TX)).filter(t=>t.category==='3D-печать'&&t.type==='income').sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,12);
    const hc=this._card();
    hc.innerHTML='<div class="card-title">История заказов</div>';
    if(!pTxs.length){hc.insertAdjacentHTML('beforeend','<div style="color:var(--muted);text-align:center;padding:16px">Нет заказов</div>');}
    else pTxs.forEach(t=>{
      const row=document.createElement('div'); row.className='log-row';
      const del=document.createElement('button'); del.className='del-btn'; del.textContent='×';
      row.innerHTML=`<div style="min-width:0;flex:1"><div style="font-size:11px">${t.comment||'—'}</div><div class="log-meta">${dStr(t.date)}</div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span class="amt i">+${fmt(t.amount)} ₽</span></div>`;
      row.querySelector('div:last-child').appendChild(del);
      del.onclick=()=>confirmDel(del,async()=>{del._ok=true;await this.db.del(S.TX,t.id);const bal=await this.db.cfg('balance');await this.db.setCfg('balance',bal-t.amount);this._render();});
      hc.appendChild(row);
    });
    c.appendChild(hc);
  }

  /* ═══════ HUB ═══════ */
  async _hub(c){
    const txs=await this.db.all(S.TX);
    const odo=await this.db.cfg('currentOdometer');
    const items=await this.db.all(S.SVC);
    const goals=(await this.db.all(S.GOALS)).filter(g=>g.active);
    const balance=await this.db.cfg('balance');
    const budgetCap=await this.db.cfg('monthlyBudgetCap');
    const mandatory=await this.db.cfg('mandatoryPayments');
    const now=new Date(), todayStr=today();
    const mStart=new Date(now.getFullYear(),now.getMonth(),1);
    const isGoal=t=>t.type==='expense'&&(t.category==='Цель'||(t.category==='Цель/Долг'&&goals.some(g=>g.name===t.comment)));
    const spentMonth=txs.filter(t=>t.type==='expense'&&new Date(t.date)>=mStart&&!isGoal(t)).reduce((s,t)=>s+t.amount,0);
    const todaySpent=txs.filter(t=>t.type==='expense'&&t.date.startsWith(todayStr)&&!isGoal(t)).reduce((s,t)=>s+t.amount,0);
    const payday=calcNextPayday(txs);
    const budRem=Math.max(0,budgetCap-(spentMonth-todaySpent));
    const dInM=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    const dRem=Math.max(1,dInM-now.getDate()+1);
    const maxBal=payday.days>0?Math.max(0,(balance-mandatory)/payday.days):0;
    const dailyBudget=Math.min(budRem/dRem,maxBal);
    const survRes=dailyBudget*payday.days;
    const freeCash=Math.max(0,balance-survRes-mandatory-1000);
    const lastExp=txs.filter(t=>t.type==='expense').sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    const daysSince=lastExp?Math.floor((now-new Date(lastExp.date))/86400000):999;
    const overdueItems=items.filter(it=>!isCondOnly(it)&&it.enabled!==false&&it.km>0&&(odo-it.lastServiceOdo)>=it.km);
    const critItems=items.filter(it=>isCondOnly(it)&&it.conditionStatus==='critical');

    // Reminders
    const remCard=this._card();
    remCard.innerHTML='<div class="card-title">Центр уведомлений</div>';
    let any=false;
    if(daysSince>=3){any=true;remCard.insertAdjacentHTML('beforeend',`<div class="reminder">📝 Последний расход: ${lastExp?dStr(lastExp.date):'давно'} (${daysSince} дн. назад). Что-то не записал?</div>`);}
    if(freeCash>500){any=true;remCard.insertAdjacentHTML('beforeend',`<div class="reminder">💰 Свободных денег: <b>${fmt(freeCash)} ₽</b> — можно на цели!</div>`);}
    if(overdueItems.length){any=true;remCard.insertAdjacentHTML('beforeend',`<div class="reminder red">🚗 Просрочено ТО: ${overdueItems.map(it=>it.label).join(', ')}</div>`);}
    if(critItems.length){any=true;remCard.insertAdjacentHTML('beforeend',`<div class="reminder red">⚠️ Критичное состояние: ${critItems.map(it=>it.label).join(', ')}</div>`);}
    goals.forEach(goal=>{
      const saved=txs.filter(t=>t.type==='expense'&&t.category==='Цель'&&t.comment===goal.name).reduce((s,t)=>s+t.amount,0);
      const dl=new Date(goal.deadline);
      const dL=Math.ceil((dl-now)/86400000);
      if(dL>0&&dL<14&&saved<goal.targetAmount){any=true;remCard.insertAdjacentHTML('beforeend',`<div class="reminder red">🎯 "${goal.name}" — ${dL} дн. до дедлайна! Накоплено ${fmt(saved)} из ${fmt(goal.targetAmount)}</div>`);}
    });
    if(!any) remCard.insertAdjacentHTML('beforeend','<div style="color:var(--green);font-size:12px;padding:8px 0">✅ Всё под контролем, Дима! Хорошая работа.</div>');
    c.appendChild(remCard);

    // Summary
    const sc=this._card();
    sc.innerHTML=`<div class="card-title">Сводка</div>
      <div class="g3">
        <div class="stat"><div class="v" style="color:${balance<0?'var(--red)':'var(--cyan)'}">${fmtI(balance)}</div><div class="l">Баланс ₽</div></div>
        <div class="stat"><div class="v" style="color:var(--violet)">${payday.days}</div><div class="l">Дн. до ${payday.label}</div></div>
        <div class="stat"><div class="v" style="color:${spentMonth>budgetCap?'var(--red)':'var(--orange)'}">${fmtI(spentMonth)}</div><div class="l">Потрачено ₽</div></div>
      </div>`;
    c.appendChild(sc);

    // Car tips
    const autoCard=this._card();
    autoCard.innerHTML='<div class="card-title">💡 Совет по Peugeot 206</div><div id="auto-tips"></div><button class="btn c full" id="ref-tips">🔄 Другой совет</button>';
    c.appendChild(autoCard);
    const showTips=()=>{
      const seed=Date.now();
      const t1=CAR_TIPS[seed%CAR_TIPS.length], t2=CAR_TIPS[(seed+7)%CAR_TIPS.length];
      autoCard.querySelector('#auto-tips').innerHTML=[t1,t2].map(t=>`<div class="tip">${t}</div>`).join('');
    };
    autoCard.querySelector('#ref-tips').onclick=showTips; showTips();

    // Print tips
    const prCard=this._card();
    const sb=now.getDate()+now.getMonth()*31;
    prCard.innerHTML=`<div class="card-title">🖨 Совет по 3D-печати</div>
      <div class="tip">${PRINT_TIPS[sb%PRINT_TIPS.length]}</div>
      <div class="tip">${PRINT_TIPS[(sb+5)%PRINT_TIPS.length]}</div>`;
    c.appendChild(prCard);

    // Recipes
    const recCard=this._card();
    recCard.innerHTML=`<div class="card-title">🍳 Быстрые рецепты</div>
      <div class="search-row">
        <select id="rec-cat"><option value="">Все</option><option value="Завтрак">Завтрак</option><option value="Обед">Обед</option><option value="Ужин">Ужин</option><option value="Перекус">Перекус</option></select>
        <input type="text" id="rec-q" placeholder="Поиск...">
      </div>
      <div id="rec-list"></div>`;
    c.appendChild(recCard);
    const renderRec=()=>{
      const cat=recCard.querySelector('#rec-cat').value;
      const q=recCard.querySelector('#rec-q').value.toLowerCase();
      let fil=RECIPES;
      if(cat) fil=fil.filter(r=>r.cat===cat);
      if(q) fil=fil.filter(r=>r.name.toLowerCase().includes(q));
      const list=recCard.querySelector('#rec-list'); list.innerHTML='';
      if(!fil.length){list.innerHTML='<div style="color:var(--muted);text-align:center;padding:16px">Нет рецептов</div>';return;}
      fil.forEach((rec,idx)=>{
        const rd=document.createElement('div'); rd.className='recipe';
        rd.innerHTML=`<div class="recipe-hd">
            <div><div class="recipe-name">${rec.name} <span style="font-size:9px;background:rgba(0,255,255,.1);color:var(--cyan);padding:1px 6px;border-radius:6px;margin-left:4px">${rec.cat}</span></div><div class="recipe-meta">⏱ ${rec.time} · 🔥 ${rec.cal}</div></div>
            <span style="color:var(--violet);font-size:20px;line-height:1">›</span>
          </div>
          <div class="recipe-body" id="rb-${idx}">
            ${rec.ingr?`<div class="rsec">Ингредиенты</div><ul>${rec.ingr.map(i=>`<li>${i}</li>`).join('')}</ul>`:''}
            <div class="rsec">Приготовление</div>
            <ol>${(rec.steps||rec.seps||[]).map(s=>`<li>${s}</li>`).join('')}</ol>
          </div>`;
        const body=rd.querySelector(`#rb-${idx}`); const arr=rd.querySelector('span:last-child');
        rd.onclick=()=>{body.classList.toggle('open');arr.textContent=body.classList.contains('open')?'‹':'›';};
        list.appendChild(rd);
      });
    };
    renderRec();
    recCard.querySelector('#rec-cat').onchange=renderRec;
    recCard.querySelector('#rec-q').oninput=renderRec;
  }

  /* ═══════ STATS ═══════ */
  async _stats(c){
    const txs=await this.db.all(S.TX);
    const now=new Date();
    if(!this.statsStart){
      const s=new Date(now);s.setDate(now.getDate()-30);
      this.statsStart=s.toISOString().split('T')[0];
      this.statsEnd=now.toISOString().split('T')[0];
    }

    // Period selector
    const pCard=this._card();
    pCard.innerHTML=`<div class="card-title">Период анализа</div>
      <div class="g2" style="margin-bottom:10px">
        <div class="ig"><label class="lbl">От</label><input type="date" id="as" value="${this.statsStart}"></div>
        <div class="ig"><label class="lbl">До</label><input type="date" id="ae" value="${this.statsEnd}"></div>
      </div>
      <button class="btn c" id="ap">Применить</button>
      <div class="btn-row" style="margin-top:8px">
        <button class="btn v" id="qt">Сегодня</button>
        <button class="btn v" id="qm">Месяц</button>
        <button class="btn v" id="qy">Год</button>
        <button class="btn v" id="qa">Всё время</button>
      </div>`;
    c.appendChild(pCard);
    const upd=(s,e)=>{this.statsStart=s;this.statsEnd=e;this._render();};
    pCard.querySelector('#ap').onclick=()=>{const s=pCard.querySelector('#as').value,e=pCard.querySelector('#ae').value;if(s&&e&&s<=e)upd(s,e);};
    pCard.querySelector('#qt').onclick=()=>{const t=today();upd(t,t);};
    pCard.querySelector('#qm').onclick=()=>upd(new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0],new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0]);
    pCard.querySelector('#qy').onclick=()=>upd(`${now.getFullYear()}-01-01`,`${now.getFullYear()}-12-31`);
    pCard.querySelector('#qa').onclick=()=>{
      if(!txs.length){upd(today(),today());return;}
      const sorted=[...txs].sort((a,b)=>new Date(a.date)-new Date(b.date));
      upd(sorted[0].date.split('T')[0], today());
    };

    const s0=new Date(this.statsStart), e0=new Date(this.statsEnd); e0.setHours(23,59,59,999);
    const pTxs=txs.filter(t=>{const d=new Date(t.date);return d>=s0&&d<=e0;});
    const totalInc=pTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const totalExp=pTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const saldo=totalInc-totalExp;

    // Summary
    const sumCard=this._card();
    sumCard.innerHTML=`<div class="card-title">${this.statsStart} — ${this.statsEnd}</div>
      <div class="g3">
        <div class="stat"><div class="v" style="color:var(--green)">+${fmtI(totalInc)}</div><div class="l">Доходы ₽</div></div>
        <div class="stat"><div class="v" style="color:var(--red)">−${fmtI(totalExp)}</div><div class="l">Расходы ₽</div></div>
        <div class="stat"><div class="v" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${saldo>=0?'+':''}${fmtI(saldo)}</div><div class="l">Сальдо ₽</div></div>
      </div>`;
    c.appendChild(sumCard);

    // Monthly bar chart
    const monthlyData={};
    txs.forEach(t=>{
      const d=new Date(t.date);
      const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if(!monthlyData[key]) monthlyData[key]={inc:0,exp:0};
      if(t.type==='income') monthlyData[key].inc+=t.amount;
      else monthlyData[key].exp+=t.amount;
    });
    const months=Object.keys(monthlyData).sort().slice(-9);
    if(months.length>0){
      const barCard=this._card();
      barCard.innerHTML='<div class="card-title">Доходы vs Расходы по месяцам</div>';
      const maxVal=Math.max(...months.map(m=>Math.max(monthlyData[m].inc,monthlyData[m].exp)),1);
      const barLeg=`<div class="bar-legend"><span><div class="dot" style="background:rgba(0,255,136,.7)"></div>Доходы</span><span><div class="dot" style="background:rgba(255,77,77,.7)"></div>Расходы</span></div>`;
      let barsHtml='<div class="bar-chart">';
      months.forEach(m=>{
        const d=monthlyData[m];
        const iw=Math.round((d.inc/maxVal)*100);
        const ew=Math.round((d.exp/maxVal)*100);
        const lbl=m.substring(5)+'/'+m.substring(2,4);
        barsHtml+=`<div class="bar-row">
          <div class="bar-label">${lbl}</div>
          <div style="flex:1">
            <div class="bar-track"><div class="bar-inc" style="width:${iw}%"></div></div>
            <div class="bar-track" style="margin-top:2px"><div class="bar-exp" style="width:${ew}%"></div></div>
          </div>
          <div class="bar-val" style="text-align:right">
            <div style="color:rgba(0,255,136,.8);font-size:9px">+${fmtI(Math.round(d.inc))}</div>
            <div style="color:rgba(255,77,77,.8);font-size:9px">−${fmtI(Math.round(d.exp))}</div>
          </div>
        </div>`;
      });
      barsHtml+='</div>';
      barCard.insertAdjacentHTML('beforeend',barLeg+barsHtml);
      c.appendChild(barCard);
    }

    // Expense pie chart
    const expByCat={};
    pTxs.filter(t=>t.type==='expense').forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+t.amount;});
    const cats=Object.keys(expByCat).sort((a,b)=>expByCat[b]-expByCat[a]);
    const vals=cats.map(k=>expByCat[k]);
    const totalE=vals.reduce((s,v)=>s+v,0)||1;
    const COLORS=['#0ff','#9b4dff','#0f8','#ff5555','#ffa040','#38c8f0','#f06dff','#ffeb40','#ff9b4d'];

    const pieCard=this._card();
    pieCard.innerHTML='<div class="card-title">Расходы по категориям</div>';
    if(!cats.length){
      pieCard.insertAdjacentHTML('beforeend','<div style="color:var(--muted);text-align:center;padding:16px">Нет расходов за период</div>');
    } else {
      const wrap=document.createElement('div'); wrap.className='canvas-wrap';
      const canvas=document.createElement('canvas'); canvas.width=420; canvas.height=220;
      wrap.appendChild(canvas); pieCard.appendChild(wrap);
      // Legend (ALL labels here, none on chart)
      const leg=document.createElement('div'); leg.className='chart-legend';
      cats.forEach((cat,i)=>{
        leg.insertAdjacentHTML('beforeend',`<span><span class="ld" style="background:${COLORS[i%COLORS.length]}"></span>${cat}: ${fmt(vals[i])} ₽ (${((vals[i]/totalE)*100).toFixed(1)}%)</span>`);
      });
      pieCard.appendChild(leg);
      requestAnimationFrame(()=>{
        const ctx=canvas.getContext('2d');
        const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2;
        const R=Math.min(cx,cy)-8;
        let a=-Math.PI/2; ctx.clearRect(0,0,W,H);
        vals.forEach((v,i)=>{
          const sw=(v/totalE)*2*Math.PI;
          ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,a,a+sw);ctx.closePath();
          ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();
          ctx.strokeStyle='rgba(8,8,14,.7)';ctx.lineWidth=2;ctx.stroke();
          a+=sw;
        });
        // Donut hole
        ctx.beginPath();ctx.arc(cx,cy,R*.46,0,2*Math.PI);
        ctx.fillStyle='rgba(8,8,14,.95)';ctx.fill();
        // Center text — larger font, clear position
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='#0ff';ctx.font=`bold 13px Segoe UI,sans-serif`;
        ctx.fillText(fmtI(Math.round(totalE))+' ₽',cx,cy-8);
        ctx.fillStyle='rgba(160,180,200,.6)';ctx.font=`11px Segoe UI,sans-serif`;
        ctx.fillText('расходы',cx,cy+10);
      });
    }
    c.appendChild(pieCard);

    // Income pie
    const incByCat={};
    pTxs.filter(t=>t.type==='income').forEach(t=>{incByCat[t.category]=(incByCat[t.category]||0)+t.amount;});
    const incCats=Object.keys(incByCat).sort((a,b)=>incByCat[b]-incByCat[a]);
    if(incCats.length){
      const incCard=this._card();
      incCard.innerHTML='<div class="card-title">Доходы по источникам</div>';
      const wrap2=document.createElement('div'); wrap2.className='canvas-wrap';
      const cv2=document.createElement('canvas'); cv2.width=420; cv2.height=200;
      wrap2.appendChild(cv2); incCard.appendChild(wrap2);
      const leg2=document.createElement('div'); leg2.className='chart-legend';
      const totalI=incCats.reduce((s,k)=>s+incByCat[k],0)||1;
      const ICOLORS=['#0f8','#22d4a4','#38f8b0','#0ea5e9','#34d399','#6ee7b7','#10b981','#059669'];
      incCats.forEach((cat,i)=>{leg2.insertAdjacentHTML('beforeend',`<span><span class="ld" style="background:${ICOLORS[i%ICOLORS.length]}"></span>${cat}: ${fmt(incByCat[cat])} ₽ (${((incByCat[cat]/totalI)*100).toFixed(1)}%)</span>`);});
      incCard.appendChild(leg2);
      requestAnimationFrame(()=>{
        const ctx=cv2.getContext('2d');
        const W=cv2.width,H=cv2.height,cx=W/2,cy=H/2,R=Math.min(cx,cy)-8;
        let a=-Math.PI/2; ctx.clearRect(0,0,W,H);
        incCats.forEach((cat,i)=>{
          const sw=(incByCat[cat]/totalI)*2*Math.PI;
          ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,a,a+sw);ctx.closePath();
          ctx.fillStyle=ICOLORS[i%ICOLORS.length];ctx.fill();
          ctx.strokeStyle='rgba(8,8,14,.7)';ctx.lineWidth=2;ctx.stroke();
          a+=sw;
        });
        ctx.beginPath();ctx.arc(cx,cy,R*.46,0,2*Math.PI);ctx.fillStyle='rgba(8,8,14,.95)';ctx.fill();
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='#0f8';ctx.font='bold 13px Segoe UI,sans-serif';
        ctx.fillText(fmtI(Math.round(totalI))+' ₽',cx,cy-8);
        ctx.fillStyle='rgba(160,180,200,.6)';ctx.font='11px Segoe UI,sans-serif';
        ctx.fillText('доходы',cx,cy+10);
      });
      c.appendChild(incCard);
    }

    // Balance line chart
    const sorted=[...pTxs].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const pts=[]; let run=0;
    sorted.forEach(t=>{run=t.type==='income'?run+t.amount:run-t.amount;pts.push(run);});
    if(pts.length>=2){
      const lineCard=this._card();
      lineCard.innerHTML='<div class="card-title">Динамика баланса за период</div>';
      const lw=document.createElement('div'); lw.className='canvas-wrap';
      const lc=document.createElement('canvas'); lc.width=420; lc.height=130;
      lw.appendChild(lc); lineCard.appendChild(lw);
      c.appendChild(lineCard);
      requestAnimationFrame(()=>{
        const ctx=lc.getContext('2d'),W=lc.width,H=lc.height,n=pts.length;
        const minY=Math.min(...pts),maxY=Math.max(...pts),rng=maxY-minY||1;
        const px=14,py=16;
        const toX=i=>px+(i/(n-1))*(W-px*2);
        const toY=v=>H-py-((v-minY)/rng)*(H-py*2);
        ctx.clearRect(0,0,W,H);
        const gr=ctx.createLinearGradient(0,0,0,H);gr.addColorStop(0,'rgba(0,255,255,.15)');gr.addColorStop(1,'rgba(0,255,255,0)');
        ctx.beginPath();ctx.moveTo(toX(0),toY(pts[0]));pts.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
        ctx.lineTo(toX(n-1),H);ctx.lineTo(toX(0),H);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
        ctx.beginPath();ctx.strokeStyle='#0ff';ctx.lineWidth=2;ctx.lineJoin='round';
        pts.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));ctx.stroke();
        pts.forEach((v,i)=>{ctx.beginPath();ctx.arc(toX(i),toY(v),2.5,0,2*Math.PI);ctx.fillStyle='#0ff';ctx.fill();});
        // Labels: top-left and bottom-left to avoid overlap with the line
        ctx.fillStyle='rgba(160,180,200,.7)';ctx.font='10px Segoe UI,sans-serif';
        ctx.textAlign='left';
        ctx.textBaseline='top'; ctx.fillText('↑ '+fmt(maxY)+' ₽', 4, 2);
        ctx.textBaseline='bottom'; ctx.fillText('↓ '+fmt(minY)+' ₽', 4, H-2);
      });
    }
  }

  /* ═══════ EXPORT / IMPORT ═══════ */
  async _export(){
    const data={version:5,exportedAt:new Date().toISOString(),
      transactions:await this.db.all(S.TX),garage_logs:await this.db.all(S.GARAGE),
      odo_history:await this.db.all(S.ODO),service_items:await this.db.all(S.SVC),
      goals:await this.db.all(S.GOALS),settings:await this.db.all(S.CFG)};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`sentinel-backup-${today()}.json`;
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  }
  async _import(file){
    if(!file) return;
    const text=await file.text();
    let data; try{data=JSON.parse(text);}catch{alert('Неверный формат файла');return;}
    if(!confirm(`Загрузить резервную копию от ${data.exportedAt||'?'}?\nВсе текущие данные будут заменены!`)) return;
    const map={transactions:S.TX,garage_logs:S.GARAGE,odo_history:S.ODO,service_items:S.SVC,goals:S.GOALS,settings:S.CFG};
    for(const [key,sn] of Object.entries(map)){
      if(!data[key]) continue;
      const ex=await this.db.all(sn);
      for(const r of ex) await this.db.del(sn,r.id||r.key);
      for(const r of data[key]) await this.db.set(sn,r);
    }
    this._render();
  }
}

new App();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
