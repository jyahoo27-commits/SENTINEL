<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sentinel OS">
<meta name="theme-color" content="#08080e">
<link rel="manifest" href="manifest.json">
<title>Sentinel OS: Carbon</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{--bg:#08080e;--card:rgba(12,12,22,.9);--border:rgba(0,255,255,.18);--cyan:#0ff;--violet:#9b4dff;--green:#0f8;--red:#ff4d4d;--orange:#ffa040;--text:#d8e0ea;--muted:#6a8090}
html,body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;height:100%;overflow-x:hidden}
body{padding-bottom:calc(env(safe-area-inset-bottom) + 16px)}

/* ── LOGO ANIMATION ── */
@keyframes logo-flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.logo{font-size:14px;font-weight:700;letter-spacing:3px;background:linear-gradient(90deg,#0ff,#9b4dff,#5ae6ff,#bf9bff,#0ff);background-size:300%;animation:logo-flow 5s ease infinite;-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}

/* ── HEADER ── */
#app-header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,rgba(0,255,255,.07),rgba(155,77,255,.05));border-bottom:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 14px 0;padding-top:calc(10px + env(safe-area-inset-top))}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.header-acts{display:flex;gap:7px}
.hdr-btn{background:rgba(0,255,255,.08);border:1px solid rgba(0,255,255,.25);border-radius:8px;color:var(--cyan);padding:5px 10px;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.5px;line-height:1}

/* ── TABS ── */
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:0}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:8px 13px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(160,180,200,.5);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s;user-select:none}
.tab.active{color:var(--cyan);border-color:var(--cyan);text-shadow:0 0 8px var(--cyan)}

/* ── CONTENT ── */
#app-content{padding:13px 13px 20px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;height:100%}

/* ── SWIPE TRANSITION ── */
.page-slide-left{animation:slideL .22s ease forwards}
.page-slide-right{animation:slideR .22s ease forwards}
@keyframes slideL{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:none}}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid rgba(0,255,255,.11);border-radius:18px;padding:15px;margin-bottom:13px}
.card.danger{border-color:rgba(255,77,77,.4);box-shadow:0 0 18px rgba(255,77,77,.08)}
.card-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan);border-left:3px solid var(--cyan);padding-left:8px;margin-bottom:13px}

/* ── TYPOGRAPHY ── */
.big{font-size:28px;font-weight:700;color:var(--cyan);letter-spacing:-1px;line-height:1}
.big.ok{color:var(--green)}.big.warn{color:var(--orange)}.big.bad{color:var(--red);text-shadow:0 0 12px rgba(255,77,77,.35)}
.sub{font-size:11px;color:var(--muted);margin-top:5px}
.lbl{display:block;font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:600;letter-spacing:.4px}

/* ── INPUTS ── */
input,select,textarea{width:100%;padding:10px 13px;background:rgba(0,0,0,.5);border:1px solid rgba(0,255,255,.2);border-radius:12px;color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--cyan)}
select option{background:#0a0a14}
textarea{resize:vertical;min-height:80px;line-height:1.6}
.ig{margin-bottom:10px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 18px;font-size:12px;font-weight:700;border-radius:30px;cursor:pointer;border:1px solid;font-family:inherit;transition:all .2s;white-space:nowrap;letter-spacing:.4px}
.btn.c{background:rgba(0,255,255,.1);border-color:var(--cyan);color:var(--cyan)}
.btn.c:active{background:rgba(0,255,255,.25)}
.btn.v{background:rgba(155,77,255,.12);border-color:var(--violet);color:#bf9bff}
.btn.v:active{background:rgba(155,77,255,.28)}
.btn.g{background:rgba(0,255,136,.08);border-color:rgba(0,255,136,.4);color:var(--green)}
.btn.r{background:rgba(255,77,77,.08);border-color:rgba(255,77,77,.4);color:#ff7070}
.btn.full{width:100%;margin-top:10px}
.btn:disabled{opacity:.35;pointer-events:none}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ── STATS ── */
.stat{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px;text-align:center}
.stat .v{font-size:16px;font-weight:700;color:var(--cyan);margin-bottom:3px}
.stat .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}

/* ── PROGRESS ── */
.prog-track{height:7px;background:rgba(255,255,255,.07);border-radius:7px;overflow:hidden;margin:7px 0 5px}
.prog-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--cyan),var(--violet));transition:width .5s}
.prog-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}

/* ── TX LOG ── */
.log-row{padding:9px 2px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center;gap:8px}
.log-row:last-child{border-bottom:none}
.log-meta{font-size:10px;color:var(--muted);margin-top:2px}
.amt{font-size:13px;font-weight:700;white-space:nowrap}
.amt.i{color:var(--green)}.amt.e{color:var(--red)}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:700;background:rgba(0,255,255,.1);color:var(--cyan);letter-spacing:.5px}
.del-btn{background:none;border:1px solid rgba(255,80,80,.2);border-radius:7px;color:rgba(255,80,80,.45);font-size:13px;padding:3px 8px;cursor:pointer;flex-shrink:0;line-height:1;transition:color .2s,border-color .2s}
.del-btn:active{color:var(--red);border-color:var(--red)}

/* ── WEAR ── */
.wear-row{margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid rgba(255,255,255,.05)}
.wear-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.wear-lbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;color:#a0b0bf;align-items:center;gap:6px}
.wear-bar{height:5px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden}
.wear-fill{height:100%;border-radius:5px;transition:width .5s}
.svc-notes{font-size:10px;color:#5a7080;font-style:italic;margin-top:3px}

/* ── PILLS ── */
.pill{display:inline-block;padding:2px 7px;border-radius:7px;font-size:9px;font-weight:700;letter-spacing:.4px;margin-right:4px;flex-shrink:0}
.pill.crit{background:rgba(255,77,77,.15);color:var(--red);border:1px solid rgba(255,77,77,.3)}
.pill.warn{background:rgba(255,160,64,.12);color:var(--orange);border:1px solid rgba(255,160,64,.25)}
.pill.info{background:rgba(68,170,255,.1);color:#5af;border:1px solid rgba(68,170,255,.2)}

/* ── BUDGET ROW ── */
.b-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.b-row:last-child{border-bottom:none}
.b-key{color:#7a90a0;font-size:11px}
.b-val{font-weight:700}

/* ── RECIPE ── */
.recipe{background:rgba(0,0,0,.35);border:1px solid rgba(155,77,255,.15);border-radius:14px;padding:13px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.recipe:active{border-color:rgba(155,77,255,.4)}
.recipe-hd{display:flex;justify-content:space-between;align-items:center}
.recipe-name{font-size:12px;font-weight:700}
.recipe-meta{font-size:10px;color:var(--muted);margin-top:3px}
.recipe-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;color:#a0b8c8;line-height:1.75}
.recipe-body.open{display:block}
.recipe-body ol{margin:5px 0 0;padding-left:18px}
.recipe-body li{margin-bottom:5px}
.rsec{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:8px 0 4px}
.recipe-body ul{margin:3px 0;padding-left:16px}

/* ── TIPS ── */
.tip{background:rgba(0,255,255,.04);border:1px solid rgba(0,255,255,.1);border-radius:10px;padding:11px 13px;margin-bottom:8px;font-size:11px;color:#9ab8cc;line-height:1.7}

/* ── REMINDER ── */
.reminder{background:rgba(255,160,64,.07);border:1px solid rgba(255,160,64,.3);border-radius:12px;padding:11px;margin-bottom:10px;font-size:12px;color:var(--orange);line-height:1.65}
.reminder.red{background:rgba(255,77,77,.07);border-color:rgba(255,77,77,.3);color:#ff6060}
.reminder.green{background:rgba(0,255,136,.06);border-color:rgba(0,255,136,.2);color:var(--green)}

/* ── CALC RESULT ── */
.calc-result{background:rgba(0,0,0,.4);border:1px solid rgba(0,255,255,.12);border-radius:12px;padding:13px;font-size:12px;line-height:2}
.calc-total{font-size:16px;font-weight:700;color:var(--cyan);margin-top:8px;border-top:1px solid rgba(0,255,255,.15);padding-top:8px}

/* ── CANVAS ── */
.canvas-wrap{border-radius:12px;overflow:hidden;background:rgba(0,0,0,.3);margin-top:8px}
.canvas-wrap canvas{display:block;width:100%}

/* ── DETAILS ── */
details{margin-top:8px}
details summary{font-size:11px;color:#5a8090;cursor:pointer;user-select:none;padding:6px 0;list-style:none}
details summary::before{content:'›';margin-right:5px;display:inline-block;transition:transform .2s}
details[open] summary::before{transform:rotate(90deg)}

/* ── SEARCH ROW ── */
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-row input{flex:1}
.search-row select{flex:0 0 auto;width:auto;min-width:110px}

/* ── GOAL MINI ── */
.goal-mini{margin-bottom:12px}
.goal-mini-title{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;align-items:center}

/* ── PAYDAY TAG ── */
.payday-tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(155,77,255,.15);border:1px solid rgba(155,77,255,.3);color:#bf9bff;letter-spacing:.5px}

/* ── COLOR DOTS ── */
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .2s;flex-shrink:0}
.color-dot.selected{border-color:white;box-shadow:0 0 8px rgba(255,255,255,.4)}

/* ── CAR SCHEMATIC ── */
#car-schema{width:100%;max-width:340px;margin:10px auto 0;display:block}
.schema-dot{cursor:pointer;transition:transform .15s}
.schema-dot:active{transform:scale(1.25)}
.schema-label{font-size:9px;fill:#a0b8cc;font-family:'Segoe UI',sans-serif;pointer-events:none}
.schema-status{font-size:8px;font-weight:700;pointer-events:none}

/* ── BAR CHART ── */
.bar-chart{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.bar-row{display:flex;align-items:center;gap:8px;font-size:10px}
.bar-row .bar-label{width:40px;text-align:right;color:var(--muted);flex-shrink:0;font-size:9px}
.bar-row .bar-track{flex:1;height:14px;background:rgba(255,255,255,.05);border-radius:7px;overflow:hidden;position:relative}
.bar-row .bar-inc{height:100%;border-radius:7px;background:linear-gradient(90deg,rgba(0,255,136,.5),rgba(0,255,136,.8));transition:width .5s}
.bar-row .bar-exp{height:100%;border-radius:7px;background:linear-gradient(90deg,rgba(255,77,77,.5),rgba(255,77,77,.8));transition:width .5s;margin-top:2px}
.bar-row .bar-val{width:68px;font-size:9px;flex-shrink:0;color:var(--muted)}
.bar-legend{display:flex;gap:14px;margin-bottom:8px;font-size:10px}
.bar-legend span{display:flex;align-items:center;gap:5px}
.bar-legend .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ── HIST POPUP ── */
.hist-list{max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(0,255,255,.2) transparent}
.hist-list::-webkit-scrollbar{width:3px}
.hist-list::-webkit-scrollbar-thumb{background:rgba(0,255,255,.25);border-radius:3px}

/* ── FREE CASH ── */
.free-cash{margin-top:8px;font-size:11px;color:var(--green);background:rgba(0,255,136,.07);padding:7px 10px;border-radius:8px;border:1px solid rgba(0,255,136,.15)}

/* ── SEP ── */
.sep{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#5a7090;margin:13px 0 8px;display:flex;align-items:center;gap:8px}
.sep::after{content:'';flex:1;height:1px;background:rgba(0,255,255,.08)}

/* ── LEGEND ── */
.chart-legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:10px}
.chart-legend span{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:#a0b0c0}
.chart-legend .ld{display:inline-block;width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* ── MANDATORY TOGGLE ── */
.mandatory-row{display:flex;align-items:center;gap:10px;padding:10px 13px;background:rgba(255,160,64,.06);border:1px solid rgba(255,160,64,.2);border-radius:12px;margin-top:8px;cursor:pointer;user-select:none;transition:background .2s}
.mandatory-row.on{background:rgba(255,160,64,.12);border-color:rgba(255,160,64,.4)}
.mandatory-toggle{position:relative;width:38px;height:20px;flex-shrink:0}
.mandatory-toggle input{opacity:0;width:0;height:0;position:absolute}
.mandatory-knob{position:absolute;inset:0;border-radius:20px;background:rgba(255,255,255,.15);transition:.25s;border:1px solid rgba(255,255,255,.2)}
.mandatory-knob::after{content:'';position:absolute;left:3px;top:2px;width:14px;height:14px;border-radius:50%;background:#6a8090;transition:.25s}
.mandatory-toggle input:checked+.mandatory-knob{background:rgba(255,160,64,.35);border-color:var(--orange)}
.mandatory-toggle input:checked+.mandatory-knob::after{left:18px;background:var(--orange)}
.mandatory-lbl{font-size:11px;font-weight:700;color:var(--orange);flex:1}
.mandatory-sub{font-size:9px;color:var(--muted)}
.mandatory-badge{display:inline-block;padding:1px 6px;border-radius:6px;font-size:8px;font-weight:700;background:rgba(255,160,64,.2);border:1px solid rgba(255,160,64,.35);color:var(--orange);margin-left:4px;vertical-align:middle}
/* ── MANDATORY PROGRESS ── */
.mand-prog{background:rgba(255,160,64,.07);border:1px solid rgba(255,160,64,.2);border-radius:12px;padding:12px;margin-bottom:12px}
.mand-prog-bar{height:6px;background:rgba(255,255,255,.07);border-radius:6px;overflow:hidden;margin:6px 0 4px}
.mand-prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--orange),#ff6020);transition:width .5s}
/* ── TX HISTORY FILTERS ── */
.tx-filter-bar{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.tx-filter-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.tx-filter-row select, .tx-filter-row input[type=date]{flex:1;min-width:90px;padding:8px 10px;font-size:11px}
.tx-filter-row input[type=text]{flex:2;min-width:120px}
.filter-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);flex-shrink:0}
.tx-sort-btn{padding:6px 12px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid rgba(0,255,255,.2);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s}
.tx-sort-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,255,255,.08)}
/* ── TX PAGINATION ── */
.tx-page-bar{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.tx-page-btn{padding:8px 16px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid rgba(0,255,255,.25);background:rgba(0,255,255,.06);color:var(--cyan);cursor:pointer;transition:all .2s}
.tx-page-btn:hover{background:rgba(0,255,255,.14)}
.tx-count-line{text-align:center;font-size:10px;color:var(--muted);margin-top:6px}

</style>
</head>
<body>

<div id="app-header">
  <div class="header-top">
    <div class="logo">SENTINEL OS</div>
    <div class="header-acts">
      <button class="hdr-btn" id="exp-btn">↓ БД</button>
      <label class="hdr-btn" style="cursor:pointer">↑ БД<input type="file" id="imp-file" accept=".json" style="display:none"></label>
    </div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="finance">Финансы</div>
    <div class="tab" data-tab="goals">Цели</div>
    <div class="tab" data-tab="garage">Гараж</div>
    <div class="tab" data-tab="print">3D Печать</div>
    <div class="tab" data-tab="hub">Хаб</div>
    <div class="tab" data-tab="stats">Статистика</div>
  </div>
</div>

<div id="app-content"></div>

<script>
'use strict';

/* ═══════════════════════════════════════
   ДАННЫЕ
═══════════════════════════════════════ */
const DB_NAME = 'SentinelCarbonV3';
const DB_VER  = 4; // bump to add any missing stores
const S = { TX:'transactions', GARAGE:'garage_logs', ODO:'odo_history', CFG:'settings', SVC:'service_items', GOALS:'goals' };

const DEFAULTS = {
  balance:0, monthlyBudgetCap:15000, mandatoryPayments:0,
  currentOdometer:0, lastOilOdo:0, lastTimingOdo:0, lastSparkOdo:0,
  printHourRate:100, printSetupFee:200, printMinPrice:500,
  advanceAmount:29000, salaryAmount:29000, carPartsNotes:'',
};

const SVC_ITEMS = [
  {key:'oil',        label:'Масло + масляный фильтр',       km:8000,  crit:'critical',condOnly:false,notes:'5W-30 · 3.2 л · не реже раза в год'},
  {key:'airfilter',  label:'Воздушный фильтр двигателя',    km:15000, crit:'warning', condOnly:false,notes:'Осматривать каждые 8к км'},
  {key:'fuelfil',    label:'Топливный фильтр',              km:30000, crit:'warning', condOnly:false,notes:'В баке — менять при замене бензонасоса'},
  {key:'cabinfilter',label:'Фильтр салона',                 km:15000, crit:'info',    condOnly:false,notes:'Раз в год минимум'},
  {key:'spark',      label:'Свечи зажигания',               km:30000, crit:'critical',condOnly:false,notes:'NGK BPR5E · зазор 0.8мм · 4 шт.'},
  {key:'brakefluid', label:'Тормозная жидкость',            km:30000, crit:'critical',condOnly:false,notes:'DOT-4 · каждые 2 года'},
  {key:'brakef',     label:'Колодки тормозные передние',    km:30000, crit:'critical',condOnly:false,notes:'Остаток <3мм → замена срочно'},
  {key:'discf',      label:'Диски тормозные передние',      km:60000, crit:'warning', condOnly:false,notes:'Мин. толщина 20мм · трещины и биение'},
  {key:'brakershoes',label:'Колодки задние (барабанные)',   km:40000, crit:'warning', condOnly:false,notes:'Остаток <2мм → замена'},
  {key:'timing',     label:'Ремень ГРМ + ролики + помпа',   km:60000, crit:'critical',condOnly:false,notes:'ТОЛЬКО комплектом! Обрыв = капремонт'},
  {key:'coolant',    label:'Охлаждающая жидкость',          km:60000, crit:'warning', condOnly:false,notes:'G11 (зелёный) · 5.6 л · не смешивать'},

/* ═══════════════════════════════════════
   INDEXEDDB
═══════════════════════════════════════ */
class DB {
  constructor(){ this.ready = this._open(); }
  _open(){
    return new Promise((res,rej)=>{
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        const mk = (n,opts,idx=[])=>{
          if (!db.objectStoreNames.contains(n)){
            const st = db.createObjectStore(n,opts);
            idx.forEach(([a,b])=>st.createIndex(a,b));
          }
        };
        mk(S.TX,    {keyPath:'id',autoIncrement:true},[['date','date'],['category','category']]);
        mk(S.GARAGE,{keyPath:'id',autoIncrement:true},[['date','date']]);
        mk(S.ODO,   {keyPath:'id',autoIncrement:true},[['date','date']]);
        mk(S.CFG,   {keyPath:'key'});
        mk(S.SVC,   {keyPath:'id',autoIncrement:true},[['key','key']]);
        mk(S.GOALS, {keyPath:'id',autoIncrement:true});
      };
      req.onsuccess = e => { this.db=e.target.result; this._seed().then(res).catch(rej); };
      req.onerror   = e => rej(e.target.error);
    });
  }
  async _seed(){
    for(const [k,v] of Object.entries(DEFAULTS)){
      if(await this.get(S.CFG,k)===null) await this.set(S.CFG,{key:k,value:v});
    }
    // Sync service items — add any new keys not yet in DB
    const existing = await this.all(S.SVC);
    const existKeys = new Set(existing.map(it=>it.key));
    if(!existing.length){
      for(const it of SVC_ITEMS) await this.add(S.SVC,{...it,lastServiceOdo:0,conditionStatus:'ok',enabled:true});
    } else {
      // Add new items that don't exist yet
      for(const it of SVC_ITEMS){
        if(!existKeys.has(it.key)){
          await this.add(S.SVC,{...it,lastServiceOdo:0,conditionStatus:'ok',enabled:true});
        }
      }
    }
    if(!(await this.all(S.GOALS)).length){
      await this.add(S.GOALS,{name:'Долг Сабине',targetAmount:100000,deadline:'2026-06-15',priority:1,monthlyAllocation:15000,color:GOAL_COLORS[0],active:true});
    }
  }
  _st(n,m='readonly'){return this.db.transaction(n,m).objectStore(n);}
  get(s,k){return new Promise((r,e)=>{const q=this._st(s).get(k);q.onsuccess=()=>r(q.result!==undefined?q.result:null);q.onerror=()=>e(q.error);});}
  set(s,o){return new Promise((r,e)=>{const q=this._st(s,'readwrite').put(o);q.onsuccess=()=>r();q.onerror=()=>e(q.error);});}
  add(s,o){return new Promise((r,e)=>{const q=this._st(s,'readwrite').add(o);q.onsuccess=()=>r(q.result);q.onerror=()=>e(q.error);});}
  all(s){return new Promise((r,e)=>{const q=this._st(s).getAll();q.onsuccess=()=>r(q.result||[]);q.onerror=()=>e(q.error);});}
  del(s,k){return new Promise((r,e)=>{const q=this._st(s,'readwrite').delete(k);q.onsuccess=()=>r();q.onerror=()=>e(q.error);});}
  async cfg(k){const r=await this.get(S.CFG,k);return r!==null?r.value:DEFAULTS[k];}
  async setCfg(k,v){await this.set(S.CFG,{key:k,value:v});}
}

function parseMoney(value) {
  if (value === undefined || value === null) return 0;
  const str = String(value).replace(',', '.').trim();
  const num = parseFloat(str);
  return isNaN(num) ? 0 : num;
}

function adjustedDate(y,m,d){
  const dt=new Date(y,m,d); const dow=dt.getDay();
  if(dow===0) dt.setDate(dt.getDate()-2);
  if(dow===6) dt.setDate(dt.getDate()-1);
  return dt;
}

function calcNextPayday(txs){
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  const cutoff=new Date(now); cutoff.setDate(cutoff.getDate()-50);

  const thisZP    = recent.some(t=>t.category==='ЗП'    &&new Date(t.date)>=mStart);
  const thisAvans = recent.some(t=>t.category==='Аванс' &&new Date(t.date)>=mStart);
  if(thisZP&&!thisAvans){
    const av=new Date(y,m,20);
    if(av>now) return{date:av,days:Math.max(1,Math.ceil((av-now)/86400000)),label:'Аванс'};
    const zp=adjustedDate(y,m+1,5);
    return{date:zp,days:Math.max(1,Math.ceil((zp-now)/86400000)),label:'ЗП'};
  }
  if(thisAvans&&!thisZP){
    const zp=adjustedDate(y,m+1,5);
    return{date:zp,days:Math.max(1,Math.ceil((zp-now)/86400000)),label:'ЗП'};
  }
  if(thisZP&&thisAvans){
    const pr=new Date(y,m+1,22);
    return{date:pr,days:Math.max(1,Math.ceil((pr-now)/86400000)),label:'Премия 🎉'};
  }
  const zp5=adjustedDate(y,m,5), av20=new Date(y,m,20), zpN=adjustedDate(y,m+1,5);
  if(now<zp5) return{date:zp5, days:Math.max(1,Math.ceil((zp5-now)/86400000)), label:'ЗП'};
  if(now<av20) return{date:av20,days:Math.max(1,Math.ceil((av20-now)/86400000)),label:'Аванс'};
  return          {date:zpN,  days:Math.max(1,Math.ceil((zpN-now)/86400000)),  label:'ЗП'};
}

function confirmDel(btn,cb){
  if(btn._c){cb();return;}
  btn._c=true; const orig=btn.textContent;
  btn.textContent='✓?'; btn.style.cssText+=';color:#ff4d4d;border-color:#ff4d4d';
  btn.onclick=()=>{btn._ok=true;cb();};
  setTimeout(()=>{if(!btn._ok){btn._c=false;btn.textContent=orig;btn.style.color='';btn.style.borderColor='';btn.onclick=()=>confirmDel(btn,cb);}},3000);
}

function calc3DPrice(wg,th,mat,hr,sf,mp){
  wg=parseFloat(wg)||0; th=parseFloat(th)||0;
  hr=parseFloat(hr)||100; sf=parseFloat(sf)||200; mp=parseFloat(mp)||500;
  let price=0,formula='',breakdown=[];
  if(wg<=50){
    const r=mat==='composite'?25:15;
    price=wg*r; formula=`Вес × ${r} (мелкий ≤50г)`;
    breakdown=[`${wg}г × ${r} ₽/г = ${fmt(price)} ₽`];
  } else if(mat==='flex'){
    const l=th*hr,mc=wg*10; price=l+mc;
    formula=`(Ч × ${hr}) + (Вес × 10)`;
    breakdown=[`Работа: ${th}ч × ${hr} = ${fmt(l)} ₽`,`TPU/Flex: ${wg}г × 10 = ${fmt(mc)} ₽`];
  } else if(mat==='composite'){
    const l=th*hr,mc=wg*20; price=l+mc;
    formula=`(Ч × ${hr}) + (Вес × 20)`;
    breakdown=[`Работа: ${th}ч × ${hr} = ${fmt(l)} ₽`,`Carbon/Glass: ${wg}г × 20 = ${fmt(mc)} ₽`,`⚠ Закалённое сопло (учтено)`];
  } else {
    const l=th*hr,mc=wg*5; price=l+mc+sf;
    formula=`(Ч × ${hr}) + (Вес × 5) + ${sf}`;
    breakdown=[`Работа: ${th}ч × ${hr} = ${fmt(l)} ₽`,`Пластик+брак: ${wg}г × 5 = ${fmt(mc)} ₽`,`Подготовка: ${fmt(sf)} ₽`];
  }
  if(price<mp){breakdown.push(`Применена минималка: ${fmtI(mp)} ₽`);price=mp;}
  return{price,formula,breakdown};
}

const TABS = ['finance','goals','garage','print','hub','stats'];

class App {
  constructor(){
    this.db=new DB();
    this.tab='finance';
    this.statsStart=null; this.statsEnd=null;
    this._swipeDir=null;
    // Transaction history filter state
    this._txShown=15; this._txSort="date_desc"; this._txType="";
    this._txDateFrom=""; this._txDateTo=""; this._txSearch=""; this._txCat="";
    this.db.ready.then(()=>this._init()).catch(e=>console.error('[Sentinel]',e));
  }

  _init(){
    document.getElementById('tabs').addEventListener('click', e=>{
      const t=e.target.dataset.tab; if(!t||t===this.tab) return;
      const oldIdx=TABS.indexOf(this.tab), newIdx=TABS.indexOf(t);
      this._swipeDir = newIdx>oldIdx ? 'left' : 'right';
      this.tab=t;
      document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
      this._scrollTabIntoView(t);
      this._render();
    });
    document.getElementById('exp-btn').onclick=()=>this._export();
    document.getElementById('imp-file').onchange=e=>this._import(e.target.files[0]);
    this._initSwipe();
    this._render();
  }

  _scrollTabIntoView(tab){
    const el=document.querySelector(`.tab[data-tab="${tab}"]`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }

  _initSwipe(){
    const el=document.getElementById('app-content');
    let sx=0,sy=0,moved=false;
    el.addEventListener('touchstart',e=>{
      sx=e.touches[0].clientX; sy=e.touches[0].clientY; moved=false;
    },{passive:true});
    el.addEventListener('touchmove',e=>{
      const dx=Math.abs(e.touches[0].clientX-sx),dy=Math.abs(e.touches[0].clientY-sy);
      if(dx>dy&&dx>10) moved=true;
    },{passive:true});
    el.addEventListener('touchend',e=>{
      if(!moved) return;
      const dx=e.changedTouches[0].clientX-sx;
      const dy=e.changedTouches[0].clientY-sy;
      if(Math.abs(dx)<55||Math.abs(dx)<Math.abs(dy)*1.4) return;
      const cur=TABS.indexOf(this.tab);
      let next=-1;
      if(dx<0&&cur<TABS.length-1) next=cur+1;
      if(dx>0&&cur>0) next=cur-1;
      if(next<0) return;
      this._swipeDir=dx<0?'left':'right';
      this.tab=TABS[next];
      document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===this.tab));
      this._scrollTabIntoView(this.tab);
      this._render();
    },{passive:true});
  }

  _render(){
    const c=document.getElementById('app-content');
    c.innerHTML='';
    const wrap=document.createElement('div');
    if(this._swipeDir==='left') wrap.className='page-slide-left';
    else if(this._swipeDir==='right') wrap.className='page-slide-right';
    this._swipeDir=null;
    c.appendChild(wrap);
    const map={finance:()=>this._finance(wrap),goals:()=>this._goals(wrap),garage:()=>this._garage(wrap),print:()=>this._print(wrap),hub:()=>this._hub(wrap),stats:()=>this._stats(wrap)};
    (map[this.tab]||map.finance)();
  }

  _card(extra=''){const el=document.createElement('div');el.className='card'+extra;return el;}

  /* ═══════ FINANCE ═══════ */
  async _finance(c){
    const balance    = await this.db.cfg('balance');
    const budgetCap  = await this.db.cfg('monthlyBudgetCap');
    const mandatory  = await this.db.cfg('mandatoryPayments');   // monthly mandatory BUDGET
    const txs        = await this.db.all(S.TX);
    const goals      = (await this.db.all(S.GOALS)).filter(g=>g.active);
    const now        = new Date(), todayStr=today();
    const mStart     = new Date(now.getFullYear(),now.getMonth(),1);

    const isGoal = t => t.type==='expense' && (t.category==='Цель'||(t.category==='Цель/Долг'&&goals.some(g=>g.name===t.comment)));

    // ── Mandatory spending this month (tracked separately, does NOT affect daily limit)
    const mandTxs         = txs.filter(t=>t.type==='expense'&&t.isMandatory&&new Date(t.date)>=mStart);
    const mandatorySpent  = mandTxs.reduce((s,t)=>s+t.amount,0);
    const mandatoryLeft   = Math.max(0, mandatory - mandatorySpent);
    const mandPct         = mandatory>0?Math.min(100,(mandatorySpent/mandatory)*100):0;

    // ── Regular (non-mandatory, non-goal) spending
    const spentMonth = txs.filter(t=>t.type==='expense'&&new Date(t.date)>=mStart&&!isGoal(t)&&!t.isMandatory).reduce((s,t)=>s+t.amount,0);
    const todaySpent = txs.filter(t=>t.type==='expense'&&t.date.startsWith(todayStr)&&!isGoal(t)&&!t.isMandatory).reduce((s,t)=>s+t.amount,0);

    const payday      = calcNextPayday(txs);
    const dInM        = new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    const dRem        = Math.max(1,dInM-now.getDate()+1);
    // daily limit = (budgetCap) / days, limited by available balance
    const maxBal      = payday.days>0?Math.max(0,(balance-mandatoryLeft)/payday.days):0;
    const budRem      = Math.max(0,budgetCap-(spentMonth-todaySpent));
    const dailyBudget = Math.min(budRem/dRem, maxBal);
    const remainToday = dailyBudget - todaySpent;
    const exceeded    = remainToday<0;
    const survRes     = dailyBudget*payday.days;
    const freeCash    = Math.max(0,balance-survRes-mandatoryLeft-1000);

    // ── Balance card ──────────────────────────────────────
    const balCard=this._card(exceeded?' danger':'');
    const bCol=balance<=0?'bad':balance<survRes?'warn':'ok';
    balCard.innerHTML=`<div class="card-title">Текущий баланс</div>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div class="big ${bCol}">${fmt(balance)} ₽</div>
        <button class="btn c" id="set-bal">Изменить</button>
      </div>
      ${exceeded?`<div class="reminder red" style="margin-top:10px">⚠ Лимит превышен на ${fmt(Math.abs(remainToday))} ₽</div>`:''}
      ${freeCash>500?`<div class="free-cash">💰 Свободных денег: <b>${fmt(freeCash)} ₽</b> — можно на цели</div>`:''}
      <div id="bal-ed"></div>`;
    c.appendChild(balCard);
    balCard.querySelector('#set-bal').onclick=()=>{
      const ed=balCard.querySelector('#bal-ed');
      if(ed.innerHTML){ed.innerHTML='';return;}
      ed.innerHTML=`<div style="display:flex;gap:8px;margin-top:12px"><input type="number" id="bi" step="0.01" value="${balance}" style="flex:1"><button class="btn c" id="bs">OK</button></div>`;
      ed.querySelector('#bs').onclick=async()=>{const v=parseMoney(ed.querySelector('#bi').value);if(!isNaN(v)&&v>=0){await this.db.setCfg('balance',v);this._render();}};
    };

    // ── Budget & paydays card ─────────────────────────────
    const dayCol=remainToday<0?'#ff4d4d':remainToday<200?'#ffa040':'#0f8';
    const budCard=this._card();
    budCard.innerHTML=`<div class="card-title">Бюджет и выплаты</div>
      <div class="b-row"><div class="b-key">Следующая выплата</div><div class="b-val"><span class="payday-tag">${payday.label} · ${dStr(payday.date)}</span> <span style="color:var(--violet);margin-left:5px"><b>${payday.days}</b> дн.</span></div></div>
      <div class="b-row"><div class="b-key">Остаток на сегодня</div><div class="b-val" style="color:${dayCol}">${fmt(remainToday)} ₽ <span style="opacity:.5;font-size:10px">/ ${fmt(dailyBudget)}</span></div></div>
      <div class="b-row"><div class="b-key">Потрачено сегодня</div><div class="b-val">${fmt(todaySpent)} ₽</div></div>
      <div class="b-row"><div class="b-key">Регуляр. расходы за месяц</div><div class="b-val" style="color:${spentMonth>budgetCap?'var(--red)':'var(--orange)'}">${fmt(spentMonth)} / ${fmtI(budgetCap)} ₽</div></div>
      <details><summary>⚙ Настройки бюджета</summary>
        <div class="g2" style="margin-top:8px">
          <div class="ig"><label class="lbl">Бюджет/месяц (₽)</label><input type="number" id="budcap" value="${budgetCap}"></div>
          <div class="ig"><label class="lbl">Обяз. платежи / мес (₽)</label><input type="number" id="mand" value="${mandatory}" placeholder="Аренда+интернет+..."></div>
        </div>
        <div style="font-size:10px;color:var(--muted);margin:6px 0 10px;line-height:1.6">
          💡 Обязательные платежи <b>не влияют</b> на дневной лимит — они идут отдельным бюджетом.<br>
          При добавлении расхода отмечай галочку «Обязательный» — и он попадёт в этот трекер.
        </div>
        <button class="btn c full" id="bud-save">Сохранить</button>
      </details>`;
    c.appendChild(budCard);
    budCard.querySelector('#bud-save').onclick=async()=>{
      const cap=parseMoney(budCard.querySelector('#budcap').value);
      const m=parseMoney(budCard.querySelector('#mand').value)||0;
      if(cap>0){await this.db.setCfg('monthlyBudgetCap',cap);await this.db.setCfg('mandatoryPayments',m);this._render();}
    };

    // ── Mandatory payments tracker ────────────────────────
    if(mandatory>0){
      const mandCard=this._card();
      const mandColor=mandPct>=100?'#ff4d4d':mandPct>=80?'#ffa040':'#0ff';
      mandCard.innerHTML=`<div class="card-title">Обязательные платежи</div>
        <div class="mand-prog">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">
            <span style="color:var(--orange);font-weight:700">Потрачено: ${fmt(mandatorySpent)} ₽</span>
            <span style="color:var(--muted)">из ${fmtI(mandatory)} ₽</span>
          </div>
          <div class="mand-prog-bar"><div class="mand-prog-fill" style="width:${mandPct}%;background:${mandPct>=100?'#ff4d4d':'linear-gradient(90deg,var(--orange),#ff6020)'}"></div></div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)">
            <span>${mandPct.toFixed(1)}% использовано</span>
            <span style="color:${mandatoryLeft>0?'var(--orange)':'var(--green)'}">
              ${mandatoryLeft>0?'Ещё нужно оплатить: '+fmt(mandatoryLeft)+' ₽':'✓ Все обязательные закрыты'}
            </span>
          </div>
        </div>
        ${mandTxs.length?`<div style="font-size:10px;color:var(--muted);margin-top:4px">
          ${mandTxs.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5).map(t=>`
            <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)">
              <span>${t.category}${t.comment?' · '+t.comment:''}</span>
              <span style="color:var(--orange);font-weight:700">−${fmt(t.amount)} ₽</span>
            </div>`).join('')}
          ${mandTxs.length>5?`<div style="color:var(--muted);text-align:center;margin-top:4px">... ещё ${mandTxs.length-5} платежей</div>`:''}
        </div>`:'<div style="font-size:11px;color:var(--muted);text-align:center;padding:8px 0">Обязательных платежей за этот месяц нет</div>'}`;
      c.appendChild(mandCard);
    }

    // ── Goals mini preview ────────────────────────────────
    if(goals.length){
      const gCard=this._card();
      gCard.innerHTML='<div class="card-title">Цели</div>';
      goals.sort((a,b)=>a.priority-b.priority).forEach(goal=>{
        const saved=txs.filter(t=>t.type==='expense'&&((t.category==='Цель'&&t.comment===goal.name)||(t.category==='Цель/Долг'&&t.comment===goal.name))).reduce((s,t)=>s+t.amount,0);
        const pct=Math.min(100,(saved/goal.targetAmount)*100);
        const left=Math.max(0,goal.targetAmount-saved);
        const dLeft=Math.ceil((new Date(goal.deadline)-now)/86400000);
        const col=goal.color||'#0ff';
        gCard.insertAdjacentHTML('beforeend',`<div class="goal-mini">
          <div class="goal-mini-title"><span style="color:${col};font-weight:700">${goal.name}</span><span style="font-size:10px;color:var(--muted)">${pct.toFixed(0)}% · ост. ${fmt(left)} ₽ · ${dLeft>0?dLeft+' дн.':'⏰'}</span></div>
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
        </div>`);
      });
      if(freeCash>500){
        const topGoal=goals[0];
        gCard.insertAdjacentHTML('beforeend',`<div style="font-size:11px;color:var(--green);margin-top:8px">💡 Свободных ${fmt(freeCash)} ₽ — можно добавить на «${topGoal.name}»</div>`);
      }
      c.appendChild(gCard);
    }

    // ── New transaction form ──────────────────────────────
    const txCard=this._card();
    const allGoals=(await this.db.all(S.GOALS)).filter(g=>g.active);
    txCard.innerHTML=`<div class="card-title">Новая транзакция</div>
      <div class="ig"><label class="lbl">Тип</label><select id="tx-type"><option value="expense">Расход</option><option value="income">Доход</option></select></div>
      <div class="g2">
        <div class="ig"><label class="lbl">Сумма (₽)</label><input type="number" id="tx-amt" placeholder="0.00" step="0.01"></div>
        <div class="ig"><label class="lbl">Категория</label><select id="tx-cat"></select></div>
      </div>
      <div class="g2">
        <div class="ig"><label class="lbl">Дата</label><input type="date" id="tx-date" value="${todayStr}"></div>
        <div class="ig"><label class="lbl">Комментарий</label><input type="text" id="tx-comment" placeholder="Необязательно"></div>
      </div>
      <div id="mandatory-wrap" style="display:none">
        <label class="mandatory-row" id="mand-row">
          <div class="mandatory-toggle"><input type="checkbox" id="tx-mandatory"><span class="mandatory-knob"></span></div>
          <div>
            <div class="mandatory-lbl">Обязательный платёж</div>
            <div class="mandatory-sub">Идёт в отдельный трекер, не влияет на дневной лимит</div>
          </div>
        </label>
      </div>
      <button class="btn c full" id="tx-add">Добавить транзакцию</button>`;
    c.appendChild(txCard);

    const typeEl=txCard.querySelector('#tx-type');
    const catEl=txCard.querySelector('#tx-cat');
    const mandWrap=txCard.querySelector('#mandatory-wrap');
    const mandRow=txCard.querySelector('#mand-row');
    const mandCb=txCard.querySelector('#tx-mandatory');

    const fillCats=()=>{
      const isExp=typeEl.value==='expense';
      mandWrap.style.display=isExp?'block':'none';

      if(isExp){

        if(allGoals.length){html+='<option disabled>── Цели ──</option>';allGoals.forEach(g=>{html+=`<option value="ЦЕЛЬ:${g.name}">🎯 ${g.name}</option>`;});}
        catEl.innerHTML=html;

      if(cat.startsWith('ЦЕЛЬ:')){comment=cat.substring(5);cat='Цель';}
      await this.db.add(S.TX,{amount:amt,type,category:cat,comment,date:new Date(dt+'T12:00:00').toISOString(),isMandatory:isMandatory||false});
      let bal=await this.db.cfg('balance');
      await this.db.setCfg('balance',type==='income'?bal+amt:bal-amt);
      txCard.querySelector('#tx-amt').value='';
      txCard.querySelector('#tx-comment').value='';

      mandRow.classList.remove('on');
      this._render();
    };

    // ── Transaction history with filter/sort/pagination ───
    await this._renderTxHistory(c, txs, goals);
  }

  async _renderTxHistory(c, txs, goals){
    const histCard=this._card();
    const allCats=[...new Set([...CAT_EXP,...CAT_INC,'Цель'])];

    // Filter bar
    histCard.innerHTML=`<div class="card-title">Операции</div>
      <div class="tx-filter-bar">

          <button class="tx-sort-btn ${this._txSort==='date_asc'?'active':''}" data-s="date_asc">↑ Дата</button>
          <button class="tx-sort-btn ${this._txSort==='amt_desc'?'active':''}" data-s="amt_desc">↓ Сумма</button>
          <button class="tx-sort-btn ${this._txSort==='amt_asc'?'active':''}" data-s="amt_asc">↑ Сумма</button>
        </div>
      </div>
      <div id="tx-stats-row" style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap"></div>
      <div id="tx-list"></div>
      <div id="tx-page-bar" class="tx-page-bar"></div>
      <div id="tx-count-line" class="tx-count-line"></div>`;
    c.appendChild(histCard);

    // Restore filter state
    const qEl=histCard.querySelector('#tx-q');
    const fcEl=histCard.querySelector('#tx-fc');
    const ftEl=histCard.querySelector('#tx-ft');
    const fromEl=histCard.querySelector('#tx-from');
    const toEl=histCard.querySelector('#tx-to');
    qEl.value=this._txSearch||'';
    fcEl.value=this._txCat||'';
    ftEl.value=this._txType||'';
    fromEl.value=this._txDateFrom||'';
    toEl.value=this._txDateTo||new Date().toISOString().split('T')[0];

    const getFiltered=()=>{
      let fil=[...txs];
      const q=(this._txSearch||'').toLowerCase();
      if(q) fil=fil.filter(t=>(t.comment||'').toLowerCase().includes(q)||t.category.toLowerCase().includes(q));
      if(this._txCat) fil=fil.filter(t=>t.category===this._txCat);
      if(this._txType==='income') fil=fil.filter(t=>t.type==='income');
      else if(this._txType==='expense') fil=fil.filter(t=>t.type==='expense'&&!t.isMandatory);
      else if(this._txType==='mandatory') fil=fil.filter(t=>t.isMandatory);
      if(this._txDateFrom){const d=new Date(this._txDateFrom+'T00:00:00');fil=fil.filter(t=>new Date(t.date)>=d);}
      if(this._txDateTo){const d=new Date(this._txDateTo+'T23:59:59');fil=fil.filter(t=>new Date(t.date)<=d);}
      // sort
      if(this._txSort==='date_desc') fil.sort((a,b)=>new Date(b.date)-new Date(a.date));
      else if(this._txSort==='date_asc') fil.sort((a,b)=>new Date(a.date)-new Date(b.date));
      else if(this._txSort==='amt_desc') fil.sort((a,b)=>b.amount-a.amount);
      else if(this._txSort==='amt_asc') fil.sort((a,b)=>a.amount-b.amount);
      return fil;
    };

    const renderList=()=>{
      const fil=getFiltered();
      const listEl=histCard.querySelector('#tx-list');
      const pageBar=histCard.querySelector('#tx-page-bar');
      const countLine=histCard.querySelector('#tx-count-line');
      const statsRow=histCard.querySelector('#tx-stats-row');
      listEl.innerHTML=''; pageBar.innerHTML=''; countLine.textContent=''; statsRow.innerHTML='';

      if(!fil.length){listEl.innerHTML='<div style="color:var(--muted);text-align:center;padding:16px">Нет операций</div>';return;}

      // Stats for filtered set
      const fInc=fil.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
      const fExp=fil.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
      statsRow.innerHTML=`
        <span style="font-size:10px;color:var(--green)">+${fmt(fInc)} ₽ доходов</span>
        <span style="font-size:10px;color:var(--red)">−${fmt(fExp)} ₽ расходов</span>
        <span style="font-size:10px;color:var(--muted)">${fil.length} операций</span>`;

      const shown=fil.slice(0,this._txShown);
      shown.forEach(tx=>{
        const row=document.createElement('div'); row.className='log-row';
        const del=document.createElement('button'); del.className='del-btn'; del.textContent='×';
        const mandBadge=tx.isMandatory?'<span class="mandatory-badge">ОБЯ3</span>':'';
        row.innerHTML=`<div style="min-width:0;flex:1">
          <span class="badge">${tx.category}</span>${mandBadge}
          <div class="log-meta">${dStr(tx.date)}${tx.comment?' · '+tx.comment:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="amt ${tx.type==='income'?'i':'e'}">${tx.type==='income'?'+':'−'}${fmt(tx.amount)} ₽</span>
        </div>`;
        row.querySelector('div:last-child').appendChild(del);
        del.onclick=()=>confirmDel(del,async()=>{
          del._ok=true;
          await this.db.del(S.TX,tx.id);
          let bal=await this.db.cfg('balance');
          await this.db.setCfg('balance',tx.type==='income'?bal-tx.amount:bal+tx.amount);
          this._render();
        });
        listEl.appendChild(row);
      });

      // Pagination
      countLine.textContent=`Показано ${Math.min(this._txShown,fil.length)} из ${fil.length}`;
      if(fil.length>this._txShown){
        const rem=fil.length-this._txShown;
        const next30=Math.min(30,rem);
        const btnMore=document.createElement('button');
        btnMore.className='tx-page-btn';
        btnMore.textContent=`↓ Показать ещё ${next30}`;
        btnMore.onclick=()=>{this._txShown+=30;renderList();};
        pageBar.appendChild(btnMore);
        if(fil.length>this._txShown){
          const btnAll=document.createElement('button');
          btnAll.className='tx-page-btn';
          btnAll.style.cssText='background:rgba(155,77,255,.1);border-color:var(--violet);color:#bf9bff';
          btnAll.textContent='Показать все';
          btnAll.onclick=()=>{this._txShown=fil.length;renderList();};
          pageBar.appendChild(btnAll);
        }
      } else if(this._txShown>15&&fil.length<=this._txShown){
        const btnCollapse=document.createElement('button');
        btnCollapse.className='tx-page-btn';
        btnCollapse.style.cssText='background:rgba(0,0,0,.2);border-color:rgba(255,255,255,.15);color:var(--muted)';
        btnCollapse.textContent='↑ Свернуть';
        btnCollapse.onclick=()=>{this._txShown=15;renderList();};
        pageBar.appendChild(btnCollapse);
      }
    };

    // Events
    let debTimer;
    const save=()=>{
      this._txSearch=qEl.value;
      this._txCat=fcEl.value;
      this._txType=ftEl.value;
      this._txDateFrom=fromEl.value;
      this._txDateTo=toEl.value;
      this._txShown=15; // reset pagination on filter change
      renderList();
    };

    qEl.oninput=()=>{clearTimeout(debTimer);debTimer=setTimeout(save,200);};
    fcEl.onchange=ftEl.onchange=fromEl.onchange=toEl.onchange=save;

    histCard.querySelectorAll('.tx-sort-btn').forEach(btn=>{
      btn.onclick=()=>{
        histCard.querySelectorAll('.tx-sort-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        this._txSort=btn.dataset.s;
        this._txShown=15;
        renderList();
      };
    });

    // Init
    this._txShown=this._txShown||15;
    renderList();
  }

  /* ═══════ GOALS ═══════ */
  async _goals(c){
    const txs=await this.db.all(S.TX);
    const goals=await this.db.all(S.GOALS);
    const now=new Date();
    const balance=await this.db.cfg('balance');
    const payday=calcNextPayday(txs);

    // inject goal styles once
    if(!document.getElementById('goal-styles2')){
      const gs=document.createElement('style');gs.id='goal-styles2';
      gs.textContent=`
        .g-pace{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;margin-bottom:14px;font-size:12px;font-weight:700}
        .g-pace.ok {background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25);color:var(--green)}
        .g-pace.warn{background:rgba(255,160,64,.08);border:1px solid rgba(255,160,64,.25);color:var(--orange)}
        .g-pace.bad {background:rgba(255,77,77,.08);border:1px solid rgba(255,77,77,.25);color:var(--red)}
        .g-pace-ico{font-size:18px;flex-shrink:0}
        .g-pace-txt{font-size:11px;font-weight:400;line-height:1.5}
        .g-scenarios{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;margin-bottom:12px}
        .g-scen-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:11px}
        .g-scen-row:last-child{border-bottom:none}
        .g-scen-label{color:#7a9aaa}
        .g-scen-val{font-weight:700}
        .g-hist-bar{display:flex;align-items:flex-end;gap:4px;height:52px;margin:6px 0 2px}
        .g-hist-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px}
        .g-hist-fill{width:100%;border-radius:3px 3px 0 0;background:rgba(0,255,255,.5);transition:height .4s;min-height:2px}
        .g-hist-lbl{font-size:7.5px;color:#5a7080;white-space:nowrap}
        .g-calc-wrap{background:rgba(0,0,0,.3);border:1px solid rgba(0,255,255,.12);border-radius:12px;padding:12px;margin-top:12px}
        .g-calc-title{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(0,255,255,.5);margin-bottom:10px}
        .g-calc-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
        .g-calc-row input{flex:1;padding:8px 10px;font-size:13px}
        .g-calc-out{font-size:11px;color:#a0b8c8;line-height:1.65;min-height:20px}
        .g-timeline{position:relative;height:6px;background:rgba(255,255,255,.07);border-radius:6px;margin:10px 0 4px;overflow:visible}
        .g-tl-fill{height:100%;border-radius:6px;transition:width .5s}
        .g-tl-marker{position:absolute;top:-4px;width:2px;height:14px;border-radius:1px;transform:translateX(-50%)}
        .g-tl-labels{display:flex;justify-content:space-between;font-size:9px;color:#5a7080;margin-top:2px}
      `;
      document.head.appendChild(gs);
    }

    for(const goal of goals){
      const goalTxs=txs.filter(t=>t.type==='expense'&&((t.category==='Цель'&&t.comment===goal.name)||(t.category==='Цель/Долг'&&t.comment===goal.name)));
      const saved=goalTxs.reduce((s,t)=>s+t.amount,0);
      const left=Math.max(0,goal.targetAmount-saved);
      const pct=Math.min(100,(saved/goal.targetAmount)*100);
      const dl=new Date(goal.deadline);
      const dLeft=Math.ceil((dl-now)/86400000);
      const mLeft=Math.max(0.5,dLeft/30);
      const col=goal.color||'#0ff';

      // ── Monthly contribution history (last 6 months) ──
      const monthlyHist=[];
      for(let i=5;i>=0;i--){
        const ms=new Date(now.getFullYear(),now.getMonth()-i,1);
        const me=new Date(now.getFullYear(),now.getMonth()-i+1,1);
        const sum=goalTxs.filter(t=>{const d=new Date(t.date);return d>=ms&&d<me;}).reduce((s,t)=>s+t.amount,0);
        const lbl=ms.toLocaleString('ru-RU',{month:'short'});
        monthlyHist.push({lbl,sum});
      }
      const recentMonths=monthlyHist.slice(-3);
      const avgMonthly=recentMonths.length?recentMonths.reduce((s,m)=>s+m.sum,0)/recentMonths.length:0;

      // ── Smart calculations ──
      const reqMonthly=mLeft>0?left/mLeft:left;              // needed/month to hit deadline
      const userAlloc=goal.monthlyAllocation||0;
      const effectiveRate=Math.max(userAlloc,avgMonthly,1);  // best estimate of real pace
      const etaMonths=effectiveRate>0?left/effectiveRate:999;
      const etaDate=new Date(now.getFullYear(),now.getMonth()+Math.ceil(etaMonths),now.getDate());
      const onTrack=effectiveRate>=reqMonthly*0.9;
      const paceGap=reqMonthly-effectiveRate;

      // ── Scenarios table ──
      const scenarios=[
        {rate:Math.round(reqMonthly/500)*500||reqMonthly, label:`Нужно (по плану)`},
        {rate:userAlloc, label:'Текущий план'},
      ];
      if(avgMonthly>10) scenarios.push({rate:Math.round(avgMonthly/100)*100, label:'Средний факт (3мес)'});
      const fastRate=Math.round(reqMonthly*1.3/500)*500;
      if(fastRate>reqMonthly) scenarios.push({rate:fastRate, label:'Ускоренный темп'});

      // ── Pace classification ──
      let paceClass='ok', paceIco='✅', paceTxt='';
      if(dLeft<0){
        paceClass='bad'; paceIco='⏰'; paceTxt=`Дедлайн прошёл ${Math.abs(dLeft)} дн. назад. Осталось ${fmt(left)} ₽ — нужно действовать!`;
      } else if(!onTrack && paceGap>500){
        const deficit=paceGap*mLeft;
        paceClass=paceGap>reqMonthly*0.5?'bad':'warn';
        paceIco=paceClass==='bad'?'🔴':'⚠️';
        paceTxt=`Не успеваешь к дедлайну. Нехватка ~${fmt(paceGap)} ₽/мес (итого ${fmt(deficit)} ₽). При текущем темпе закроешь ~${dStr(etaDate)}.`;
      } else {
        paceTxt=`Темп норм. При текущем откладывании ${fmtI(effectiveRate)} ₽/мес закроешь ${etaMonths<=mLeft?'к дедлайну 🎉':'~'+dStr(etaDate)}.`;
      }

      const gc=this._card();
      gc.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div>
            <div style="font-size:15px;font-weight:700;color:${col}">${goal.name}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">
              ${'★'.repeat(goal.priority||1)}${'☆'.repeat(3-(goal.priority||1))} · дедлайн: ${dStr(goal.deadline)}
              ${dLeft>0?` · осталось <b style="color:${dLeft<30?'var(--red)':'var(--orange)}'}">${dLeft} дн.</b>`:''}
            </div>
          </div>
          <button class="del-btn" data-gid="${goal.id}">×</button>
        </div>

        <!-- Pace status -->
        <div class="g-pace ${paceClass}">
          <span class="g-pace-ico">${paceIco}</span>
          <span class="g-pace-txt">${paceTxt}</span>
        </div>

        <!-- Stats row -->
        <div class="g3" style="margin-bottom:12px">
          <div class="stat"><div class="v" style="color:${col}">${fmt(saved)} ₽</div><div class="l">Накоплено</div></div>
          <div class="stat"><div class="v" style="color:var(--orange)">${fmt(left)} ₽</div><div class="l">Осталось</div></div>
          <div class="stat"><div class="v" style="color:${onTrack?'var(--green)':'var(--red)'}">${fmt(reqMonthly)} ₽</div><div class="l">Нужно/мес</div></div>
        </div>

        <!-- Timeline bar -->
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px">
            <span>Прогресс к цели</span><span style="color:${col}">${pct.toFixed(1)}%</span>
          </div>
          <div class="g-timeline">
            <div class="g-tl-fill" style="width:${pct}%;background:linear-gradient(90deg,${col},${col}88)"></div>
            ${dLeft>0&&goal.targetAmount>0?`<div class="g-tl-marker" style="left:${Math.min(99,pct)}%;background:white;opacity:.6"></div>`:''}
          </div>
          <div class="g-tl-labels"><span>0</span><span>${fmtI(goal.targetAmount/2)} ₽</span><span>${fmtI(goal.targetAmount)} ₽</span></div>
        </div>

        <!-- Scenarios table -->
        <div class="g-scenarios">
          <div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(0,255,255,.4);margin-bottom:8px">Сценарии закрытия</div>
          ${scenarios.map(sc=>{
            if(!sc.rate||sc.rate<=0) return '';
            const mNeeded=sc.rate>0?left/sc.rate:999;
            const closeDate=new Date(now.getFullYear(),now.getMonth()+Math.ceil(mNeeded),now.getDate());
            const isOk=closeDate<=dl;
            return `<div class="g-scen-row">
              <span class="g-scen-label">${sc.label}</span>
              <div style="text-align:right">
                <div class="g-scen-val" style="color:${isOk?'var(--green)':'var(--orange)'}">${fmtI(sc.rate)} ₽/мес</div>
                <div style="font-size:9px;color:${isOk?'rgba(0,255,136,.5)':'var(--muted)'}">→ ${dStr(closeDate)} ${isOk?'✓':''}</div>
              </div>
            </div>`;
          }).join('')}
        </div>

        <!-- Monthly contribution history chart -->
        ${monthlyHist.some(m=>m.sum>0)?`
        <div style="margin-bottom:12px">
          <div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(0,255,255,.4);margin-bottom:8px">История пополнений (6 мес.)</div>
          <div class="g-hist-bar">${(()=>{
            const maxV=Math.max(...monthlyHist.map(m=>m.sum),reqMonthly*0.1,1);
            return monthlyHist.map(m=>{
              const h=Math.max(2,Math.round((m.sum/maxV)*50));
              const isReq=m.sum>=reqMonthly*0.9;
              return `<div class="g-hist-col">
                <div class="g-hist-fill" style="height:${h}px;background:${isReq?'rgba(0,255,136,.55)':m.sum>0?'rgba(0,255,255,.4)':'rgba(255,255,255,.06)'}"></div>
                <div class="g-hist-lbl">${m.lbl}</div>
              </div>`;
            }).join('');
          })()}</div>
          <div style="font-size:10px;color:var(--muted);text-align:right">ср. 3 мес: <b style="color:${col}">${fmt(avgMonthly)} ₽</b></div>
        </div>`:''}

        <!-- Smart calculator -->
        <div class="g-calc-wrap">
          <div class="g-calc-title">🔢 Калькулятор — когда закрою?</div>
          <div class="g-calc-row">
            <span style="font-size:11px;color:var(--muted);white-space:nowrap">₽/мес</span>
            <input type="number" id="gcalc-${goal.id}" placeholder="${Math.round(reqMonthly)}" value="${userAlloc||''}">
          </div>
          <div class="g-calc-out" id="gcalc-out-${goal.id}">
            ${userAlloc>0?`При ${fmtI(userAlloc)} ₽/мес → закроешь ${dStr(new Date(now.getFullYear(),now.getMonth()+Math.ceil(left/userAlloc),now.getDate()))} ${left/userAlloc<=mLeft?'✓ До дедлайна':'⚠ После дедлайна'}`:'Введи сумму чтобы увидеть прогноз'}
          </div>
          ${balance>0&&left>0?`<div style="font-size:10px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)">
            💡 У тебя <b style="color:${col}">${fmt(balance)} ₽</b> на балансе — ${balance>=left?`хватает закрыть цель прямо сейчас!`:`хватит ещё на <b>${Math.floor(balance/Math.max(effectiveRate,1))} мес</b> откладывания`}
          </div>`:''}
        </div>

        <!-- История пополнений -->
        <details style="margin-top:12px">
          <summary>📜 История пополнений (${goalTxs.length})</summary>
          <div class="hist-list" style="margin-top:8px">
            ${goalTxs.length===0?'<div style="color:var(--muted);font-size:11px;text-align:center;padding:10px">Нет пополнений</div>':
              [...goalTxs].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(tx=>`
                <div class="log-row">
                  <div style="min-width:0;flex:1"><div style="font-size:11px;color:#a0b8c0">${dStr(tx.date)}</div></div>
                  <div class="amt e">−${fmt(tx.amount)} ₽</div>
                </div>`).join('')}
          </div>
        </details>

        <!-- Редактировать -->
        <details style="margin-top:8px">
          <summary>✏ Редактировать цель</summary>
          <div style="margin-top:10px" class="g2">
            <div class="ig"><label class="lbl">Название</label><input id="ge-n-${goal.id}" value="${goal.name}"></div>
            <div class="ig"><label class="lbl">Сумма цели (₽)</label><input type="number" id="ge-t-${goal.id}" value="${goal.targetAmount}"></div>
            <div class="ig"><label class="lbl">Дедлайн</label><input type="date" id="ge-d-${goal.id}" value="${goal.deadline}"></div>
            <div class="ig"><label class="lbl">₽/мес на цель</label><input type="number" id="ge-a-${goal.id}" value="${goal.monthlyAllocation||0}"></div>
            <div class="ig"><label class="lbl">Приоритет</label><select id="ge-p-${goal.id}">
              <option value="1" ${goal.priority===1?'selected':''}>1 — Высокий</option>
              <option value="2" ${goal.priority===2?'selected':''}>2 — Средний</option>
              <option value="3" ${goal.priority===3?'selected':''}>3 — Низкий</option>
            </select></div>
            <div class="ig"><label class="lbl">Цвет</label><div id="ge-cols-${goal.id}" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:5px">
              ${GOAL_COLORS.map(cl=>`<div class="color-dot${goal.color===cl?' selected':''}" data-col="${cl}" style="background:${cl}"></div>`).join('')}
            </div></div>
          </div>
          <button class="btn c full" id="ge-s-${goal.id}">Сохранить</button>
        </details>

        <!-- Пополнение -->
        <div style="margin-top:12px">
          <div style="font-size:10px;color:var(--muted);margin-bottom:6px">Внести пополнение:</div>
          <div style="display:flex;gap:8px">
            <input type="number" id="gp-${goal.id}" placeholder="Сумма ₽" style="flex:1">
            <button class="btn g" id="ga-${goal.id}">+ Добавить</button>
          </div>
        </div>
      `;
      c.appendChild(gc);

      // Live calculator
      gc.querySelector(`#gcalc-${goal.id}`).oninput=e=>{
        const rate=parseFloat(e.target.value)||0;
        const out=gc.querySelector(`#gcalc-out-${goal.id}`);
        if(!rate||rate<=0){out.textContent='Введи сумму чтобы увидеть прогноз';return;}
        const m=left/rate;
        const cd=new Date(now.getFullYear(),now.getMonth()+Math.ceil(m),now.getDate());
        const ok=cd<=dl;
        out.innerHTML=`При <b>${fmtI(rate)} ₽/мес</b> → <b style="color:${ok?'var(--green)':'var(--orange)'}">${dStr(cd)}</b> ${ok?'✓ Успеваешь!':'⚠ Позже дедлайна'}`;
      };

      gc.querySelector(`[data-gid="${goal.id}"]`).onclick=()=>confirmDel(gc.querySelector(`[data-gid="${goal.id}"]`),async()=>{gc.querySelector(`[data-gid="${goal.id}"]`)._ok=true;await this.db.del(S.GOALS,goal.id);this._render();});

      let selColor=goal.color||GOAL_COLORS[0];
      gc.querySelectorAll(`#ge-cols-${goal.id} .color-dot`).forEach(el=>{el.onclick=()=>{gc.querySelectorAll(`#ge-cols-${goal.id} .color-dot`).forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selColor=el.dataset.col;};});

      gc.querySelector(`#ge-s-${goal.id}`).onclick=async()=>{
        const updated={...goal,

    async _garage(c){

    if(hist.length>=2){
      const s=[...hist].sort((a,b)=>new Date(a.date)-new Date(b.date));
      const span=(new Date(s[s.length-1].date)-new Date(s[0].date))/86400000;

        <button class="btn c" id="odo-btn">Обновить пробег</button>

      <div id="odo-ed"></div>`;

      ed.querySelector('#os').onclick=async()=>{
        const v=parseFloat(ed.querySelector('#oi').value);
        const dt=ed.querySelector('#od').value||today();
        if(isNaN(v)||v<0) return;
        await this.db.setCfg('currentOdometer',v);
        await this.db.add(S.ODO,{odometer:v,date:new Date(dt+'T12:00:00').toISOString()});
        this._render();
      };
    };

    // ── Построение statusMap2 для всех деталей (нужно для схемы и прогноза) ──
    const statusMap2 = {};

      const condOnly = isCondOnly(it);
      if (condOnly) {
        const cs = it.conditionStatus||'ok';
        statusMap2[it.key] = {
          color: cCol(cs), pct: {ok:0,watch:35,replace:70,critical:100}[cs]||0,
