      this._render();
    });
    document.getElementById('exp-btn').onclick=()=>this._export();
    document.getElementById('imp-file').onchange=e=>this._import(e.target.files[0]);
    this._initSwipe();
    this._render();
  }

  _scrollTabIntoView(tab){
    const el=document.querySelector(`.tab[data-tab="${tab}"]`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }

  _initSwipe(){
    const el=document.getElementById('app-content');
    let sx=0,sy=0,moved=false;
    el.addEventListener('touchstart',e=>{
      sx=e.touches[0].clientX; sy=e.touches[0].clientY; moved=false;
    },{passive:true});
    el.addEventListener('touchmove',e=>{
      const dx=Math.abs(e.touches[0].clientX-sx),dy=Math.abs(e.touches[0].clientY-sy);
      if(dx>dy&&dx>10) moved=true;
    },{passive:true});
    el.addEventListener('touchend',e=>{
      if(!moved) return;
      const dx=e.changedTouches[0].clientX-sx;
      const dy=e.changedTouches[0].clientY-sy;
      if(Math.abs(dx)<55||Math.abs(dx)<Math.abs(dy)*1.4) return;
      const cur=TABS.indexOf(this.tab);
      let next=-1;
      if(dx<0&&cur<TABS.length-1) next=cur+1;
      if(dx>0&&cur>0) next=cur-1;
      if(next<0) return;
      this._swipeDir=dx<0?'left':'right';
      this.tab=TABS[next];
      document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===this.tab));
      this._scrollTabIntoView(this.tab);
      this._render();
    },{passive:true});
  }

  _render(){
    const c=document.getElementById('app-content');
    c.innerHTML='';
    const wrap=document.createElement('div');
    if(this._swipeDir==='left') wrap.className='page-slide-left';
    else if(this._swipeDir==='right') wrap.className='page-slide-right';
    this._swipeDir=null;
    c.appendChild(wrap);
    const map={finance:()=>this._finance(wrap),goals:()=>this._goals(wrap),garage:()=>this._garage(wrap),print:()=>this._print(wrap),hub:()=>this._hub(wrap),stats:()=>this._stats(wrap)};
    (map[this.tab]||map.finance)();
  }

  _card(extra=''){const el=document.createElement('div');el.className='card'+extra;return el;}

  /* ═══════ FINANCE ═══════ */
  async _finance(c){
    const balance=await this.db.cfg('balance');
    const budgetCap=await this.db.cfg('monthlyBudgetCap');
    const mandatory=await this.db.cfg('mandatoryPayments');
    const txs=await this.db.all(S.TX);
    const goals=(await this.db.all(S.GOALS)).filter(g=>g.active);
    const now=new Date(), todayStr=today();
    const mStart=new Date(now.getFullYear(),now.getMonth(),1);

    const isGoal=t=>t.type==='expense'&&(t.category==='Цель'||(t.category==='Цель/Долг'&&goals.some(g=>g.name===t.comment)));
    const spentMonth=txs.filter(t=>t.type==='expense'&&new Date(t.date)>=mStart&&!isGoal(t)).reduce((s,t)=>s+t.amount,0);
    const todaySpent=txs.filter(t=>t.type==='expense'&&t.date.startsWith(todayStr)&&!isGoal(t)).reduce((s,t)=>s+t.amount,0);
    const payday=calcNextPayday(txs);
    const budRem=Math.max(0,budgetCap-(spentMonth-todaySpent));
    const dInM=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    const dRem=Math.max(1,dInM-now.getDate()+1);
    const maxBal=payday.days>0?Math.max(0,(balance-mandatory)/payday.days):0;
    const dailyBudget=Math.min(budRem/dRem,maxBal);
    const remainToday=dailyBudget-todaySpent;
    const exceeded=remainToday<0;
    const survRes=dailyBudget*payday.days;
    const freeCash=Math.max(0,balance-survRes-mandatory-1000);

    // Balance
    const balCard=this._card(exceeded?' danger':'');
    const bCol=balance<=0?'bad':balance<survRes?'warn':'ok';
    balCard.innerHTML=`<div class="card-title">Текущий баланс</div>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div class="big ${bCol}">${fmt(balance)} ₽</div>
        <button class="btn c" id="set-bal">Изменить</button>
      </div>
      ${exceeded?`<div class="reminder red" style="margin-top:10px">⚠ Лимит превышен на ${fmt(Math.abs(remainToday))} ₽</div>`:''}
      ${freeCash>500?`<div class="free-cash">💰 Свободных денег: <b>${fmt(freeCash)} ₽</b> — можно на цели</div>`:''}
      <div id="bal-ed"></div>`;
    c.appendChild(balCard);
    balCard.querySelector('#set-bal').onclick=()=>{
      const ed=balCard.querySelector('#bal-ed');
      if(ed.innerHTML){ed.innerHTML='';return;}
      ed.innerHTML=`<div style="display:flex;gap:8px;margin-top:12px"><input type="number" id="bi" step="0.01" value="${balance}" style="flex:1"><button class="btn c" id="bs">OK</button></div>`;
      ed.querySelector('#bs').onclick=async()=>{const v=parseFloat(ed.querySelector('#bi').value);if(!isNaN(v)){await this.db.setCfg('balance',v);this._render();}};
    };

    // Budget
    const dayCol=remainToday<0?'#ff4d4d':remainToday<200?'#ffa040':'#0f8';
    const budCard=this._card();
    budCard.innerHTML=`<div class="card-title">Бюджет и выплаты</div>
      <div class="b-row"><div class="b-key">Следующая выплата</div><div class="b-val"><span class="payday-tag">${payday.label} · ${dStr(payday.date)}</span> <span style="color:var(--violet);margin-left:5px"><b>${payday.days}</b> дн.</span></div></div>
      <div class="b-row"><div class="b-key">Остаток на сегодня</div><div class="b-val" style="color:${dayCol}">${fmt(remainToday)} ₽ <span style="opacity:.5;font-size:10px">/ ${fmt(dailyBudget)}</span></div></div>
      <div class="b-row"><div class="b-key">Потрачено сегодня</div><div class="b-val">${fmt(todaySpent)} ₽</div></div>
      <div class="b-row"><div class="b-key">За этот месяц</div><div class="b-val" style="color:${spentMonth>budgetCap?'var(--red)':'var(--orange)'}">${fmt(spentMonth)} / ${fmtI(budgetCap)} ₽</div></div>
      <details><summary>⚙ Настройки бюджета</summary>
        <div class="g2" style="margin-top:8px">
          <div class="ig"><label class="lbl">Бюджет/месяц (₽)</label><input type="number" id="budcap" value="${budgetCap}"></div>
          <div class="ig"><label class="lbl">Обяз. платежи (₽/мес)</label><input type="number" id="mand" value="${mandatory}"></div>
        </div>
        <button class="btn c full" id="bud-save">Сохранить</button>
      </details>`;
    c.appendChild(budCard);
    budCard.querySelector('#bud-save').onclick=async()=>{
      const cap=parseFloat(budCard.querySelector('#budcap').value);
      const m=parseFloat(budCard.querySelector('#mand').value)||0;
      if(cap>0){await this.db.setCfg('monthlyBudgetCap',cap);await this.db.setCfg('mandatoryPayments',m);this._render();}
    };

    // Goals mini
    if(goals.length){
      const gCard=this._card();
      gCard.innerHTML='<div class="card-title">Цели</div>';
      goals.sort((a,b)=>a.priority-b.priority).forEach(goal=>{
        const saved=txs.filter(t=>t.type==='expense'&&((t.category==='Цель'&&t.comment===goal.name)||(t.category==='Цель/Долг'&&t.comment===goal.name))).reduce((s,t)=>s+t.amount,0);
        const pct=Math.min(100,(saved/goal.targetAmount)*100);
        const left=Math.max(0,goal.targetAmount-saved);
        const dLeft=Math.ceil((new Date(goal.deadline)-now)/86400000);
        const col=goal.color||'#0ff';
        gCard.insertAdjacentHTML('beforeend',`<div class="goal-mini">
          <div class="goal-mini-title"><span style="color:${col};font-weight:700">${goal.name}</span><span style="font-size:10px;color:var(--muted)">${pct.toFixed(0)}% · ост. ${fmt(left)} ₽ · ${dLeft>0?dLeft+' дн.':'⏰'}</span></div>
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
        </div>`);
      });
      c.appendChild(gCard);
    }

    // Add tx
    const txCard=this._card();
    const allGoals=(await this.db.all(S.GOALS)).filter(g=>g.active);
    txCard.innerHTML=`<div class="card-title">Новая транзакция</div>
      <div class="ig"><label class="lbl">Тип</label><select id="tx-type"><option value="expense">Расход</option><option value="income">Доход</option></select></div>
      <div class="g2">
        <div class="ig"><label class="lbl">Сумма (₽)</label><input type="number" id="tx-amt" placeholder="0.00" step="0.01"></div>
        <div class="ig"><label class="lbl">Категория</label><select id="tx-cat"></select></div>
      </div>
      <div class="g2">
        <div class="ig"><label class="lbl">Дата</label><input type="date" id="tx-date" value="${todayStr}"></div>
        <div class="ig"><label class="lbl">Комментарий</label><input type="text" id="tx-comment" placeholder="Необязательно"></div>
      </div>
      <button class="btn c full" id="tx-add">Добавить транзакцию</button>`;
    c.appendChild(txCard);
    const typeEl=txCard.querySelector('#tx-type'), catEl=txCard.querySelector('#tx-cat');
    const fillCats=()=>{
      if(typeEl.value==='income'){catEl.innerHTML=CAT_INC.map(x=>`<option value="${x}">${x}</option>`).join('');}
      else{
        let html=CAT_EXP.map(x=>`<option value="${x}">${x}</option>`).join('');
        if(allGoals.length){html+='<option disabled>── Цели ──</option>';allGoals.forEach(g=>{html+=`<option value="ЦЕЛЬ:${g.name}">🎯 ${g.name}</option>`;});}
        catEl.innerHTML=html;
      }
    };
    fillCats(); typeEl.onchange=fillCats;
    txCard.querySelector('#tx-add').onclick=async()=>{
      const amt=parseFloat(txCard.querySelector('#tx-amt').value);
      if(!amt||amt<=0) return;
      const type=typeEl.value; let cat=catEl.value, comment=txCard.querySelector('#tx-comment').value.trim();
      const dt=txCard.querySelector('#tx-date').value||todayStr;
      if(cat.startsWith('ЦЕЛЬ:')){comment=cat.substring(5);cat='Цель';}
      await this.db.add(S.TX,{amount:amt,type,category:cat,comment,date:new Date(dt+'T12:00:00').toISOString()});
      let bal=await this.db.cfg('balance');
      await this.db.setCfg('balance',type==='income'?bal+amt:bal-amt);
      txCard.querySelector('#tx-amt').value=''; txCard.querySelector('#tx-comment').value='';
      this._render();
    };

    // History
    const sorted=[...txs].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const histCard=this._card();
    histCard.innerHTML=`<div class="card-title">Операции</div>
      <div class="search-row"><input type="text" id="tx-q" placeholder="🔍 Поиск..."><select id="tx-fc"><option value="">Все</option>${[...new Set([...CAT_EXP,...CAT_INC,'Цель'])].map(x=>`<option value="${x}">${x}</option>`).join('')}</select></div>
      <div id="tx-list"></div>`;
    c.appendChild(histCard);
    const renderList=(q='',fc='')=>{
      let fil=sorted;
      if(q) fil=fil.filter(t=>(t.comment||'').toLowerCase().includes(q)||t.category.toLowerCase().includes(q));
      if(fc) fil=fil.filter(t=>t.category===fc);
      const listEl=histCard.querySelector('#tx-list'); listEl.innerHTML='';
      if(!fil.length){listEl.innerHTML='<div style="color:var(--muted);text-align:center;padding:16px">Нет операций</div>';return;}
      fil.slice(0,30).forEach(tx=>{
        const row=document.createElement('div'); row.className='log-row';
        const del=document.createElement('button'); del.className='del-btn'; del.textContent='×';
        row.innerHTML=`<div style="min-width:0;flex:1"><span class="badge">${tx.category}</span><div class="log-meta">${dStr(tx.date)}${tx.comment?' · '+tx.comment:''}</div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span class="amt ${tx.type==='income'?'i':'e'}">${tx.type==='income'?'+':'−'}${fmt(tx.amount)} ₽</span></div>`;
        row.querySelector('div:last-child').appendChild(del);
        del.onclick=()=>confirmDel(del,async()=>{del._ok=true;await this.db.del(S.TX,tx.id);let bal=await this.db.cfg('balance');await this.db.setCfg('balance',tx.type==='income'?bal-tx.amount:bal+tx.amount);this._render();});
        listEl.appendChild(row);
      });
    };
    renderList();
    let st; histCard.querySelector('#tx-q').oninput=e=>{clearTimeout(st);st=setTimeout(()=>renderList(e.target.value.toLowerCase(),histCard.querySelector('#tx-fc').value),200);};
    histCard.querySelector('#tx-fc').onchange=e=>renderList(histCard.querySelector('#tx-q').value.toLowerCase(),e.target.value);
  }

  /* ═══════ GOALS ═══════ */
  async _goals(c){
    const txs=await this.db.all(S.TX);
    const goals=await this.db.all(S.GOALS);
    const now=new Date();

    for(const goal of goals){
      const goalTxs=txs.filter(t=>t.type==='expense'&&((t.category==='Цель'&&t.comment===goal.name)||(t.category==='Цель/Долг'&&t.comment===goal.name)));
      const saved=goalTxs.reduce((s,t)=>s+t.amount,0);
      const left=Math.max(0,goal.targetAmount-saved);
      const pct=Math.min(100,(saved/goal.targetAmount)*100);
      const dl=new Date(goal.deadline);
      const dLeft=Math.ceil((dl-now)/86400000);
      const mLeft=Math.max(0.5,dLeft/30);
      const needPM=left/mLeft;
      const col=goal.color||'#0ff';
      const monthsToClose=goal.monthlyAllocation>0?left/goal.monthlyAllocation:999;
      const eta=goal.monthlyAllocation>0&&monthsToClose<999?new Date(now.getFullYear(),now.getMonth()+Math.ceil(monthsToClose),now.getDate()):null;

      const gc=this._card();
      gc.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div><div style="font-size:14px;font-weight:700;color:${col}">${goal.name}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">Приоритет ${'★'.repeat(goal.priority||1)}${'☆'.repeat(3-(goal.priority||1))} · до ${dStr(goal.deadline)}</div></div>
          <button class="del-btn" data-gid="${goal.id}">×</button></div>
        <div class="g2" style="margin-bottom:10px">
          <div class="stat"><div class="v" style="color:${col}">${fmt(saved)} ₽</div><div class="l">Накоплено</div></div>
          <div class="stat"><div class="v" style="color:var(--orange)">${fmt(left)} ₽</div><div class="l">Осталось</div></div>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,${col},${col}88)"></div></div>
        <div class="prog-meta"><span>${pct.toFixed(1)}%</span><span style="color:${dLeft<0?'var(--red)':'inherit'}">${dLeft>0?dLeft+' дн. до срока':'⏰ Просрочено'}</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.8">
          Нужно/мес: <b style="color:var(--orange)">${fmt(needPM)} ₽</b>
          · Откладываю: <b style="color:${col}">${fmtI(goal.monthlyAllocation||0)} ₽/мес</b>
          ${eta?` · закроешь ~${dStr(eta)}`:''}
        </div>

        <!-- ИСТОРИЯ ПОПОЛНЕНИЙ -->
        <details style="margin-top:10px">
          <summary>📜 История пополнений (${goalTxs.length})</summary>
          <div class="hist-list" style="margin-top:8px">
            ${goalTxs.length===0?'<div style="color:var(--muted);font-size:11px;text-align:center;padding:10px">Нет пополнений</div>':
              [...goalTxs].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(tx=>`
                <div class="log-row">
                  <div style="min-width:0;flex:1">
                    <div style="font-size:11px;color:#a0b8c0">${dStr(tx.date)}</div>
                  </div>
                  <div class="amt e">−${fmt(tx.amount)} ₽</div>
                </div>`).join('')}
          </div>
        </details>

        <!-- РЕДАКТИРОВАТЬ -->
        <details style="margin-top:8px">
          <summary>✏ Редактировать цель</summary>
          <div style="margin-top:10px" class="g2">
            <div class="ig"><label class="lbl">Название</label><input id="ge-n-${goal.id}" value="${goal.name}"></div>
            <div class="ig"><label class="lbl">Сумма цели (₽)</label><input type="number" id="ge-t-${goal.id}" value="${goal.targetAmount}"></div>
            <div class="ig"><label class="lbl">Дедлайн</label><input type="date" id="ge-d-${goal.id}" value="${goal.deadline}"></div>
            <div class="ig"><label class="lbl">₽/мес на цель</label><input type="number" id="ge-a-${goal.id}" value="${goal.monthlyAllocation||0}"></div>
            <div class="ig"><label class="lbl">Приоритет</label><select id="ge-p-${goal.id}">
              <option value="1" ${goal.priority===1?'selected':''}>1 — Высокий</option>
              <option value="2" ${goal.priority===2?'selected':''}>2 — Средний</option>
              <option value="3" ${goal.priority===3?'selected':''}>3 — Низкий</option>
            </select></div>
            <div class="ig"><label class="lbl">Цвет</label><div id="ge-cols-${goal.id}" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:5px">
              ${GOAL_COLORS.map(cl=>`<div class="color-dot${goal.color===cl?' selected':''}" data-col="${cl}" style="background:${cl}"></div>`).join('')}
            </div></div>
          </div>
          <button class="btn c full" id="ge-s-${goal.id}">Сохранить</button>
        </details>

        <!-- ПОПОЛНЕНИЕ -->
        <div style="margin-top:12px">
          <div style="font-size:10px;color:var(--muted);margin-bottom:6px">Внести пополнение:</div>
          <div style="display:flex;gap:8px">
            <input type="number" id="gp-${goal.id}" placeholder="Сумма ₽" style="flex:1">
            <button class="btn g" id="ga-${goal.id}">+ Добавить</button>
          </div>
        </div>`;
      c.appendChild(gc);

      gc.querySelector(`[data-gid="${goal.id}"]`).onclick=()=>confirmDel(gc.querySelector(`[data-gid="${goal.id}"]`),async()=>{gc.querySelector(`[data-gid="${goal.id}"]`)._ok=true;await this.db.del(S.GOALS,goal.id);this._render();});

      let selColor=goal.color||GOAL_COLORS[0];
      gc.querySelectorAll(`#ge-cols-${goal.id} .color-dot`).forEach(el=>{el.onclick=()=>{gc.querySelectorAll(`#ge-cols-${goal.id} .color-dot`).forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selColor=el.dataset.col;};});

      gc.querySelector(`#ge-s-${goal.id}`).onclick=async()=>{
        const updated={...goal,
          name:gc.querySelector(`#ge-n-${goal.id}`).value.trim()||goal.name,
          targetAmount:parseFloat(gc.querySelector(`#ge-t-${goal.id}`).value)||goal.targetAmount,
          deadline:gc.querySelector(`#ge-d-${goal.id}`).value||goal.deadline,
          monthlyAllocation:parseFloat(gc.querySelector(`#ge-a-${goal.id}`).value)||0,
          priority:parseInt(gc.querySelector(`#ge-p-${goal.id}`).value)||1,
          color:selColor,
        };
        await this.db.set(S.GOALS,updated); this._render();
      };

      gc.querySelector(`#ga-${goal.id}`).onclick=async()=>{
        const amt=parseFloat(gc.querySelector(`#gp-${goal.id}`).value);
        if(!amt||amt<=0) return;
        await this.db.add(S.TX,{amount:amt,type:'expense',category:'Цель',comment:goal.name,date:new Date().toISOString()});
        const bal=await this.db.cfg('balance');
        await this.db.setCfg('balance',bal-amt);
        this._render();
      };
    }

    // New goal
    const nc=this._card();
    let newColor=GOAL_COLORS[0];
    nc.innerHTML=`<div class="card-title">Добавить цель</div>
      <div class="ig"><label class="lbl">Название</label><input id="ng-n" placeholder="Долг, аренда, телефон…"></div>
      <div class="g2">
        <div class="ig"><label class="lbl">Сумма (₽)</label><input type="number" id="ng-t" placeholder="100000"></div>
        <div class="ig"><label class="lbl">Дедлайн</label><input type="date" id="ng-d" value="2026-12-31"></div>
        <div class="ig"><label class="lbl">₽/мес</label><input type="number" id="ng-a" placeholder="5000"></div>
        <div class="ig"><label class="lbl">Приоритет</label><select id="ng-p"><option value="1">1 — Высокий</option><option value="2" selected>2 — Средний</option><option value="3">3 — Низкий</option></select></div>
      </div>
      <div class="ig"><label class="lbl">Цвет</label><div id="ng-cols" style="display:flex;gap:7px;flex-wrap:wrap;margin-top:5px">${GOAL_COLORS.map((cl,i)=>`<div class="color-dot${i===0?' selected':''}" data-col="${cl}" style="background:${cl}"></div>`).join('')}</div></div>
      <button class="btn v full" id="ng-add">Создать цель</button>`;
    c.appendChild(nc);
    nc.querySelectorAll('#ng-cols .color-dot').forEach(el=>{el.onclick=()=>{nc.querySelectorAll('#ng-cols .color-dot').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');newColor=el.dataset.col;};});
    nc.querySelector('#ng-add').onclick=async()=>{
      const name=nc.querySelector('#ng-n').value.trim();
      const target=parseFloat(nc.querySelector('#ng-t').value);
      if(!name||!target){alert('Введи название и сумму');return;}
      await this.db.add(S.GOALS,{name,targetAmount:target,deadline:nc.querySelector('#ng-d').value,priority:parseInt(nc.querySelector('#ng-p').value)||2,monthlyAllocation:parseFloat(nc.querySelector('#ng-a').value)||0,color:newColor,active:true});
      this._render();
    };

    // Backup
    const bc=this._card();
    bc.innerHTML=`<div class="card-title">Резервная копия</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Данные в IndexedDB — при очистке кэша удалятся. Делай бэкап!</div>
      <label class="btn c" style="cursor:pointer">📂 Загрузить JSON<input type="file" accept=".json" id="imp2" style="display:none"></label>`;
    c.appendChild(bc);
    bc.querySelector('#imp2').onchange=e=>this._import(e.target.files[0]);
  }

  /* ═══════ GARAGE ═══════ */
    async _garage(c){
    const odo=await this.db.cfg('currentOdometer');
    const hist=await this.db.all(S.ODO);
    const items=(await this.db.all(S.SVC)).filter(it=>it.enabled!==false).sort((a,b)=>a.id-b.id);
    const partsNotes=await this.db.cfg('carPartsNotes');

    let avgDay=20;
    if(hist.length>=2){
      const s=[...hist].sort((a,b)=>new Date(a.date)-new Date(b.date));
      const span=(new Date(s[s.length-1].date)-new Date(s[0].date))/86400000;
      const delta=s[s.length-1].odometer-s[0].odometer;
      if(span>0&&delta>0) avgDay=delta/span;
    }

    // Odometer card
    const oc=this._card();
    oc.innerHTML=`<div class="card-title">Peugeot 206 · 1.1i TU1JP</div>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div class="big">${fmtI(odo)} <span style="font-size:16px;color:rgba(0,255,255,.4)">км</span></div>
        <button class="btn c" id="odo-btn">Обновить пробег</button>
      </div>
      <div class="sub">~${Math.round(avgDay*7)} км/нед · ~${Math.round(avgDay)} км/день</div>
      <div id="odo-ed"></div>`;
    c.appendChild(oc);
    oc.querySelector('#odo-btn').onclick=()=>{
      const ed=oc.querySelector('#odo-ed');
      if(ed.innerHTML){ed.innerHTML='';return;}
      ed.innerHTML=`<div class="g2" style="margin-top:12px"><div class="ig"><label class="lbl">Новый пробег (км)</label><input type="number" id="oi" value="${odo}"></div><div class="ig"><label class="lbl">Дата</label><input type="date" id="od" value="${today()}"></div></div><button class="btn c full" id="os">Сохранить</button>`;
      ed.querySelector('#os').onclick=async()=>{
        const v=parseFloat(ed.querySelector('#oi').value);
        const dt=ed.querySelector('#od').value||today();
        if(isNaN(v)||v<0) return;
        await this.db.setCfg('currentOdometer',v);
        await this.db.add(S.ODO,{odometer:v,date:new Date(dt+'T12:00:00').toISOString()});
        this._render();
      };
    };

    // ── Построение statusMap2 для всех деталей (нужно для схемы и прогноза) ──
    const statusMap2 = {};
    items.forEach(it => {
      const condOnly = isCondOnly(it);
      if (condOnly) {
        const cs = it.conditionStatus||'ok';
        statusMap2[it.key] = {
          color: cCol(cs), pct: {ok:0,watch:35,replace:70,critical:100}[cs]||0,
          statusText: {ok:'Норма',watch:'Наблюдение',replace:'Заменить',critical:'КРИТИЧНО'}[cs]||'Норма',
          notes: it.notes||'', label: it.label||it.key,
          lastKm: it.lastServiceOdo||0, km: 0, condOnly: true,
        };
      } else {
        const done = Math.max(0, odo - (it.lastServiceOdo||0));
        const pct  = it.km>0 ? Math.min(100,(done/it.km)*100) : 0;
        const rem  = Math.max(0, (it.km||0)-done);
        statusMap2[it.key] = {
          color: wCol(pct), pct,
          statusText: pct<60?'Норма':pct<85?'Внимание':'ПРОСРОЧЕНО',
          notes: it.notes||'', label: it.label||it.key,
          lastKm: it.lastServiceOdo||0, km: it.km||0, rem, condOnly: false,
        };
      }
    });

    // ═══════════════════════════════════════════════════════════════════
    // НОВАЯ ИНТЕРАКТИВНАЯ СХЕМА (Blueprint с Pan & Zoom)
    // ═══════════════════════════════════════════════════════════════════
    const schCard = this._card();
    schCard.style.padding = '0';
    schCard.style.overflow = 'hidden';
    schCard.style.position = 'relative';

    if (!document.getElementById('blueprint-styles')) {
      const sts = document.createElement('style'); sts.id='blueprint-styles';
      sts.textContent = `
        .bp-header { padding: 15px; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(0,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .bp-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--cyan); border-left: 3px solid var(--cyan); padding-left: 8px; }
        .bp-tabs { display: flex; gap: 8px; background: rgba(0,0,0,0.5); padding: 4px; border-radius: 12px; border: 1px solid rgba(0,255,255,0.15); }
        .bp-tab { padding: 6px 14px; border-radius: 8px; font-size: 10px; font-weight: 700; letter-spacing: .5px; cursor: pointer; color: #5a7080; transition: all 0.2s; user-select: none; }
        .bp-tab.on { background: rgba(0,255,255,0.15); color: var(--cyan); text-shadow: 0 0 8px rgba(0,255,255,0.5); }
        .bp-viewport { width: 100%; height: 380px; position: relative; background: #04060a; overflow: hidden; cursor: grab; touch-action: none; }
        .bp-viewport:active { cursor: grabbing; }
        .bp-canvas { width: 100%; height: 100%; transform-origin: 0 0; will-change: transform; }
        .bp-canvas svg { display: block; width: 100%; height: 100%; overflow: visible; }
        .bp-hs { cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bp-hs:active { transform: scale(0.85); }
        .bp-hs-ring { transform-origin: center; animation: ring-pulse 2s infinite; }
        @keyframes ring-pulse { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }
        .bp-controls { position: absolute; bottom: 15px; right: 15px; display: flex; flex-direction: column; gap: 6px; z-index: 10; }
        .bp-ctrl-btn { width: 32px; height: 32px; border-radius: 8px; background: rgba(6,12,20,0.8); border: 1px solid rgba(0,255,255,0.2); color: var(--cyan); font-size: 18px; font-weight: 300; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(4px); transition: background 0.2s; }
        .bp-ctrl-btn:active { background: rgba(0,255,255,0.2); }
        .bp-legend { position: absolute; bottom: 15px; left: 15px; display: flex; flex-direction: column; gap: 4px; pointer-events: none; z-index: 10; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(4px); }
        .bp-legend span { display: flex; align-items: center; gap: 6px; font-size: 9px; color: #8a9baa; }
        .bp-legend i { width: 8px; height: 8px; border-radius: 50%; }
        .bp-sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .bp-sheet-overlay.show { opacity: 1; pointer-events: auto; }
        .bp-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #0c0c16; border-top: 1px solid var(--cyan); border-radius: 24px 24px 0 0; z-index: 1000; padding: 20px; transition: bottom 0.35s cubic-bezier(0.1, 0.8, 0.2, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.8); padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .bp-sheet.show { bottom: 0; }
        .bp-sheet-drag { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; margin: 0 auto 15px; }
        .bp-sheet-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .bp-sheet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .bp-sheet-stat { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; }
        .bp-sheet-stat .lbl { font-size: 10px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .bp-sheet-stat .val { font-size: 14px; font-weight: 700; }
        .bp-sheet-notes { background: rgba(0,255,255,0.05); border-left: 3px solid rgba(0,255,255,0.4); padding: 12px; font-size: 11px; color: #a0b8cc; line-height: 1.6; border-radius: 0 8px 8px 0; }
        .bp-sheet-close { width: 100%; padding: 14px; margin-top: 15px; background: rgba(255,255,255,0.05); border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 13px; cursor: pointer; transition: background 0.2s; }
        .bp-sheet-close:active { background: rgba(255,255,255,0.1); }
      `;
      document.head.appendChild(sts);
    }

    // Координаты хотспотов (вид капота и снизу)
    const HOTSPOTS = [
      // Капот
      ['oil',         150, 200, 'Масло+ф.',  'hood'],
      ['timing',      90,  180, 'ГРМ',       'hood'],
      ['airfilter',   80,  110, 'Возд.ф.',   'hood'],
      ['fuelfil',     240, 290, 'Топл.ф.',   'hood'],
      ['coolant',     240, 140, 'Охл.жидк.', 'hood'],
      ['battery',     230, 80,  'АКБ',       'hood'],
      ['spark',       150, 160, 'Свечи (4)', 'hood'],
      ['gearboxoil',  100, 260, 'Масло КПП', 'hood'],
      ['brakefluid',  240, 210, 'Торм.жидк.','hood'],
      ['throttle',    190, 140, 'Дроссель',  'hood'],
      ['lambda',      180, 270, 'Λ-зонд',    'hood'],
      ['exhaust',     150, 310, 'Выхлоп',    'hood'],
      // Снизу
      ['timing',      110, 100, 'ГРМ',       'bottom'],
      ['oil',         150, 120, 'Масло',     'bottom'],
      ['gearboxoil',  120, 150, 'КПП',       'bottom'],
      ['bearingfl',   60,  130, 'Ступ.ПЛ',   'bottom'],
      ['bearingfr',   240, 130, 'Ступ.ПП',   'bottom'],
      ['cvjointl',    90,  160, 'ШРУС Л',    'bottom'],
      ['cvjointr',    210, 160, 'ШРУС П',    'bottom'],
      ['brakef',      50,  145, 'Диск ПЛ',   'bottom'],
      ['discf',       250, 145, 'Диск ПП',   'bottom'],
      ['stablink',    150, 210, 'Стаб.',     'bottom'],
      ['exhaust',     160, 280, 'Выхлоп',    'bottom'],
      ['lambda',      160, 250, 'Λ-зонд',    'bottom'],
      ['fuelfil',     150, 360, 'Бак/ф.',    'bottom'],
      ['bearingrl',   60,  350, 'Ступ.ЗЛ',   'bottom'],
      ['bearingrr',   240, 350, 'Ступ.ЗП',   'bottom'],
      ['brakershoes', 50,  365, 'Кол.ЗЛ',    'bottom'],
      ['reardrumfl',  250, 365, 'Кол.ЗП',    'bottom'],
      ['handbrake',   150, 330, 'Трос рч.',   'bottom'],
    ];

    const HS = HOTSPOTS.filter(([key,,,,view], idx, self) => {
      const k = key+view; return self.findIndex(x => x[0]+x[4] === k) === idx;
    });

    function buildBlueprintSVG(view) {
      const W = 300, H = view === 'hood' ? 400 : 450;
      const defs = `<defs>
        <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
          <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(0,255,255,0.05)" stroke-width="0.5"/>
        </pattern>
        <filter id="neon-b"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="neon-r"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="neon-y"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>`;
      let body = `<rect width="100%" height="100%" fill="url(#grid)" />`;
      if (view === 'hood') {
        body += `
          <path d="M 20 40 Q 150 20 280 40 L 290 380 Q 150 390 10 380 Z" fill="none" stroke="rgba(0,180,255,0.2)" stroke-width="2" stroke-dasharray="10 5"/>
          <text x="150" y="30" fill="rgba(0,255,255,0.3)" font-size="10" text-anchor="middle" letter-spacing="4">FRONT BUMPER</text>
          <rect x="70" y="130" width="160" height="110" rx="12" fill="rgba(0,40,60,0.5)" stroke="rgba(0,255,255,0.5)" stroke-width="2" filter="url(#neon-b)"/>
          <path d="M 70 160 L 230 160 M 70 190 L 230 190 M 70 220 L 230 220" stroke="rgba(0,255,255,0.15)" stroke-width="1"/>
          <text x="150" y="150" fill="rgba(0,255,255,0.8)" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="2">TU1JP 1.1i</text>
          <rect x="60" y="140" width="30" height="90" rx="6" fill="rgba(20,20,30,0.8)" stroke="#5a8090" stroke-width="1.5" stroke-dasharray="4 2"/>
          <circle cx="75" cy="155" r="8" fill="none" stroke="#5a8090"/>
          <circle cx="75" cy="215" r="10" fill="none" stroke="#5a8090"/>
          <path d="M 70 240 L 130 240 L 140 290 L 60 280 Z" fill="rgba(20,30,50,0.6)" stroke="rgba(100,150,255,0.4)" stroke-width="1.5"/>
          <rect x="200" y="60" width="60" height="40" rx="4" fill="rgba(255,0,0,0.1)" stroke="rgba(255,80,80,0.5)" stroke-width="1.5"/>
          <text x="230" y="84" fill="rgba(255,80,80,0.6)" font-size="10" text-anchor="middle" font-weight="bold">12V BAT</text>
          <rect x="40" y="80" width="80" height="50" rx="8" fill="rgba(0,255,100,0.05)" stroke="rgba(0,255,100,0.4)" stroke-width="1.5"/>
          <path d="M 120 105 Q 160 105 190 140" fill="none" stroke="rgba(0,255,100,0.3)" stroke-width="8" stroke-dasharray="2 4"/>
          <circle cx="240" cy="140" r="18" fill="rgba(0,200,255,0.1)" stroke="rgba(0,200,255,0.6)" stroke-width="1.5"/>
          <circle cx="240" cy="210" r="14" fill="rgba(255,160,0,0.1)" stroke="rgba(255,160,0,0.6)" stroke-width="1.5"/>
          <path d="M 100 240 Q 150 260 150 350" fill="none" stroke="rgba(255,100,0,0.4)" stroke-width="4"/>
          <path d="M 120 240 Q 150 260 150 350" fill="none" stroke="rgba(255,100,0,0.4)" stroke-width="4"/>
        `;
      } else {
        body += `
          <path d="M 30 20 Q 150 0 270 20 L 280 430 Q 150 450 20 430 Z" fill="rgba(4,6,12,0.8)" stroke="rgba(0,255,255,0.1)" stroke-width="1"/>
          <line x1="60" y1="130" x2="240" y2="130" stroke="rgba(0,150,255,0.3)" stroke-width="8"/>
          <path d="M 60 130 L 100 180 L 200 180 L 240 130" fill="none" stroke="rgba(0,255,255,0.4)" stroke-width="2"/>
          <rect x="35" y="100" width="25" height="60" rx="4" fill="#080c14" stroke="rgba(0,255,255,0.5)" stroke-width="2"/>
          <rect x="240" y="100" width="25" height="60" rx="4" fill="#080c14" stroke="rgba(0,255,255,0.5)" stroke-width="2"/>
          <rect x="90" y="90" width="120" height="70" rx="10" fill="rgba(0,50,80,0.4)" stroke="rgba(0,255,255,0.6)" stroke-width="1.5"/>
          <path d="M 150 160 L 160 250 L 160 380" fill="none" stroke="rgba(255,140,0,0.5)" stroke-width="6"/>
          <rect x="145" y="270" width="30" height="50" rx="8" fill="rgba(40,20,0,0.8)" stroke="rgba(255,140,0,0.8)" stroke-width="1.5"/>
          <rect x="140" y="380" width="40" height="60" rx="10" fill="rgba(40,20,0,0.8)" stroke="rgba(255,140,0,0.8)" stroke-width="1.5"/>
          <path d="M 60 350 Q 150 330 240 350" fill="none" stroke="rgba(0,200,200,0.5)" stroke-width="10"/>
          <rect x="35" y="320" width="25" height="60" rx="4" fill="#080c14" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
          <rect x="240" y="320" width="25" height="60" rx="4" fill="#080c14" stroke="rgba(0,255,255,0.4)" stroke-width="1.5"/>
          <rect x="100" y="340" width="100" height="60" rx="15" fill="rgba(100,80,20,0.3)" stroke="rgba(255,200,50,0.5)" stroke-width="1.5"/>
          <text x="150" y="375" fill="rgba(255,200,50,0.4)" font-size="12" font-weight="bold" text-anchor="middle">FUEL</text>
        `;
      }
      let dots = '';
      HS.filter(h => h[4] === view).forEach(([key, cx, cy, lbl]) => {
        const st = statusMap2[key];
        if (!st) return;
        const col = st.color;
        const isRed = col === '#ff4d4d';
        const isOra = col === '#ffa040';
        const filter = isRed ? 'url(#neon-r)' : isOra ? 'url(#neon-y)' : 'url(#neon-b)';
        dots += `
          <g class="bp-hs" data-key="${key}" transform="translate(${cx}, ${cy})">
            ${isRed || isOra ? `<circle class="bp-hs-ring" cx="0" cy="0" r="14" fill="none" stroke="${col}" stroke-width="2"/>` : ''}
            <circle cx="0" cy="0" r="10" fill="rgba(0,0,0,0.8)" stroke="${col}" stroke-width="2" filter="${filter}"/>
            <circle cx="0" cy="0" r="4" fill="${col}"/>
            <text x="0" y="22" text-anchor="middle" font-size="9" font-family="Segoe UI, sans-serif" font-weight="600" fill="rgba(255,255,255,0.8)" pointer-events="none" filter="drop-shadow(0 2px 2px rgba(0,0,0,0.8))">${lbl}</text>
          </g>
        `;
      });
      return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${defs}${body}${dots}</svg>`;
    }

    schCard.innerHTML = `
      <div class="bp-header">
        <div class="bp-title">Peugeot 206 Blueprint</div>
        <div class="bp-tabs">
          <div class="bp-tab on" data-view="hood">Капот</div>
          <div class="bp-tab" data-view="bottom">Снизу</div>
        </div>
      </div>
      <div class="bp-viewport" id="bp-view">
        <div class="bp-canvas" id="bp-canvas"></div>
        <div class="bp-legend">
          <span><i style="background:#0f8; box-shadow: 0 0 5px #0f8"></i> Норма</span>
          <span><i style="background:#ffa040; box-shadow: 0 0 5px #ffa040"></i> Внимание</span>
          <span><i style="background:#ff4d4d; box-shadow: 0 0 5px #ff4d4d"></i> Критично</span>
        </div>
        <div class="bp-controls">
          <button class="bp-ctrl-btn" id="bp-z-in">+</button>
          <button class="bp-ctrl-btn" id="bp-z-out">−</button>
          <button class="bp-ctrl-btn" id="bp-z-reset" style="font-size:12px; font-weight:bold">⛶</button>
        </div>
      </div>
    `;
    c.appendChild(schCard);

    // Bottom Sheet (один раз добавляем в body)
    if (!document.getElementById('bp-sheet-overlay')) {
      const bsHTML = `
        <div class="bp-sheet-overlay" id="bp-sheet-overlay"></div>
        <div class="bp-sheet" id="bp-sheet">
          <div class="bp-sheet-drag"></div>
          <div id="bp-sheet-content"></div>
          <button class="bp-sheet-close" id="bp-sheet-close">Закрыть</button>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', bsHTML);
      const overlay = document.getElementById('bp-sheet-overlay');
      const sheet = document.getElementById('bp-sheet');
      const closeBtn = document.getElementById('bp-sheet-close');
      const closeSheet = () => { sheet.classList.remove('show'); overlay.classList.remove('show'); };
      overlay.onclick = closeSheet;
      closeBtn.onclick = closeSheet;
    }

    const canvasDiv = schCard.querySelector('#bp-canvas');
    const viewport = schCard.querySelector('#bp-view');
    let scale = 1, posX = 0, posY = 0;
    let isDragging = false, startX, startY;

    const updateTransform = () => {
      const maxDrag = 150 * scale;
      posX = Math.max(-maxDrag, Math.min(maxDrag, posX));
      posY = Math.max(-maxDrag, Math.min(maxDrag, posY));
      canvasDiv.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    };
    const resetZoom = () => { scale = 1; posX = 0; posY = 0; updateTransform(); };
    schCard.querySelector('#bp-z-in').onclick = () => { scale = Math.min(scale + 0.3, 3); updateTransform(); };
    schCard.querySelector('#bp-z-out').onclick = () => { scale = Math.max(scale - 0.3, 0.5); updateTransform(); };
    schCard.querySelector('#bp-z-reset').onclick = resetZoom;

    viewport.addEventListener('mousedown', e => {
      if (e.target.closest('.bp-hs') || e.target.closest('.bp-controls')) return;
      isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY;
    });
    window.addEventListener('mousemove', e => { if (!isDragging) return; posX = e.clientX - startX; posY = e.clientY - startY; updateTransform(); });
    window.addEventListener('mouseup', () => { isDragging = false; });
    viewport.addEventListener('wheel', e => { e.preventDefault(); const delta = e.deltaY > 0 ? -0.1 : 0.1; scale = Math.max(0.5, Math.min(scale + delta, 3)); updateTransform(); }, { passive: false });
    viewport.addEventListener('touchstart', e => { if (e.touches.length !== 1 || e.target.closest('.bp-hs') || e.target.closest('.bp-controls')) return; isDragging = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY; }, { passive: true });
    viewport.addEventListener('touchmove', e => { if (!isDragging || e.touches.length !== 1) return; e.preventDefault(); posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; updateTransform(); }, { passive: false });
    viewport.addEventListener('touchend', () => { isDragging = false; });

    const renderView = (view) => {
      canvasDiv.innerHTML = buildBlueprintSVG(view);
      resetZoom();
      canvasDiv.querySelectorAll('.bp-hs').forEach(el => {
        el.onclick = (e) => {
          e.stopPropagation();
          const key = el.dataset.key;
          const st = statusMap2[key];
          if (!st) return;
          const sContent = document.getElementById('bp-sheet-content');
          let statsHtml = '';
          if (st.condOnly) {
            statsHtml = `<div class="bp-sheet-stat"><div class="lbl">Текущее состояние</div><div class="val" style="color:${st.color}">${st.statusText}</div></div>`;
          } else {
            statsHtml = `
              <div class="bp-sheet-stat"><div class="lbl">Износ / Остаток</div><div class="val" style="color:${st.color}">${st.pct.toFixed(0)}% <span style="font-size:12px; font-weight:normal; opacity:0.6; margin-left:5px">(${st.rem > 0 ? fmtI(st.rem)+' км' : 'Просрочено'})</span></div></div>
              <div class="bp-sheet-stat"><div class="lbl">Регламент замены</div><div class="val" style="color:var(--cyan)">${fmtI(st.km)} км</div></div>
            `;
          }
          sContent.innerHTML = `
            <div class="bp-sheet-title" style="color:${st.color}">
              <span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:${st.color}; box-shadow: 0 0 10px ${st.color}"></span>
              ${st.label}
            </div>
            <div class="bp-sheet-grid">${statsHtml}</div>
            ${st.lastKm > 0 ? `<div style="font-size:11px; color:#6a8090; margin-bottom:12px">Последнее обслуживание: <b>${fmtI(st.lastKm)} км</b></div>` : ''}
            ${st.notes ? `<div class="bp-sheet-notes"><b>📝 Примечание:</b><br>${st.notes}</div>` : ''}
          `;
          document.getElementById('bp-sheet-overlay').classList.add('show');
          document.getElementById('bp-sheet').classList.add('show');
        };
      });
    };

    renderView('hood');
    schCard.querySelectorAll('.bp-tab').forEach(tab => {
      tab.onclick = () => {
        schCard.querySelectorAll('.bp-tab').forEach(t => t.classList.remove('on'));
        tab.classList.add('on');
        renderView(tab.dataset.view);
      };
    });

    // ── Прогноз обслуживания (wear intervals) ──
    const wc = this._card();
    wc.innerHTML = '<div class="card-title">Прогноз обслуживания</div>';
    items.forEach(it => {
      const div = document.createElement('div'); div.className = 'wear-row';
      const critClass = (it.crit || it.criticality) === 'critical' ? 'crit' : (it.crit || it.criticality) === 'warning' ? 'warn' : 'info';
      const critLbl = { critical:'КРИТ', warning:'ВНМ', info:'ОК' }[it.crit || it.criticality] || 'ОК';
      const condOnly = isCondOnly(it);
      if (condOnly) {
        const cs = it.conditionStatus || 'ok';
        const pctMap = { ok:0, watch:35, replace:70, critical:100 };
        div.innerHTML = `
          <div class="wear-lbl">
            <span><span class="pill ${critClass}">${critLbl}</span>${it.label}</span>
            <select class="cond-sel" style="background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.12);border-radius:7px;color:${cCol(cs)};font-size:10px;padding:3px 7px;cursor:pointer;outline:none;width:auto">
              <option value="ok" ${cs === 'ok' ? 'selected' : ''}>Норма</option>
              <option value="watch" ${cs === 'watch' ? 'selected' : ''}>Наблюдение</option>
              <option value="replace" ${cs === 'replace' ? 'selected' : ''}>Заменить</option>
              <option value="critical" ${cs === 'critical' ? 'selected' : ''}>Критично!</option>
            </select>
          </div>
          <div class="wear-bar"><div class="wear-fill" style="width:${pctMap[cs] || 0}%;background:${cCol(cs)}"></div></div>
          ${it.notes ? `<div class="svc-notes">${it.notes}</div>` : ''}
        `;
        div.querySelector('.cond-sel').onchange = async e => {
          await this.db.set(S.SVC, { ...it, conditionStatus: e.target.value, condOnly: true, conditionOnly: true });
          e.target.style.color = cCol(e.target.value);
        };
      } else {
        const done = Math.max(0, odo - it.lastServiceOdo);
        const pct = it.km > 0 ? Math.min(100, (done / it.km) * 100) : 0;
        const rem = Math.max(0, it.km - done);
        const col = wCol(pct);
        const eta = avgDay > 0 && rem > 0 ? dStr(new Date(Date.now() + (rem / avgDay) * 86400000)) : '—';
        div.innerHTML = `
          <div class="wear-lbl"><span><span class="pill ${critClass}">${critLbl}</span>${it.label}</span><span style="color:${col};font-weight:700">${pct.toFixed(0)}%</span></div>
          <div class="wear-bar"><div class="wear-fill" style="width:${pct}%;background:${col}"></div></div>
          ${it.notes ? `<div class="svc-notes">${it.notes}</div>` : ''}
          <div style="font-size:10px;color:var(--muted);margin-top:3px">каждые ${fmtI(it.km)} км · ост. ${fmtI(rem)} км · ~${eta}${it.lastServiceOdo ? ' · при ' + fmtI(it.lastServiceOdo) + ' км' : ''}</div>
        `;
      }
      wc.appendChild(div);
    });
    c.appendChild(wc);

    // ── Запись ТО ──
    const sc = this._card();
    const itemOpts = items.filter(it => !isCondOnly(it)).map(it => `<option value="${it.id}">${it.label}</option>`).join('');
    sc.innerHTML = `
      <div class="card-title">Записать ТО / работу</div>
      <div class="ig"><label class="lbl">Работа</label><select id="svc-it">${itemOpts}<option value="other">Другое…</option></select></div>
      <div class="g2">
        <div class="ig"><label class="lbl">Пробег (км)</label><input type="number" id="svc-o" value="${odo}"></div>
        <div class="ig"><label class="lbl">Стоимость (₽)</label><input type="number" id="svc-c" placeholder="0"></div>
      </div>
      <div class="g2">
        <div class="ig"><label class="lbl">Дата</label><input type="date" id="svc-d" value="${today()}"></div>
        <div class="ig"><label class="lbl">Комментарий</label><input type="text" id="svc-n" placeholder="Что сделано"></div>
      </div>
      <button class="btn c full" id="svc-add">Записать в журнал</button>
    `;
    c.appendChild(sc);
    sc.querySelector('#svc-add').onclick = async () => {
      const itemId = parseInt(sc.querySelector('#svc-it').value);
      const svcOdo = parseFloat(sc.querySelector('#svc-o').value);
      const cost = parseFloat(sc.querySelector('#svc-c').value) || 0;
      const comment = sc.querySelector('#svc-n').value.trim();
      const dt = sc.querySelector('#svc-d').value || today();
      if (isNaN(svcOdo)) return;
      const selItem = items.find(it => it.id === itemId);
      const label = selItem ? selItem.label : 'Другое';
      await this.db.add(S.GARAGE, { type: selItem?.key || 'other', label, odometer: svcOdo, cost, comment, date: new Date(dt + 'T12:00:00').toISOString() });
      if (selItem) await this.db.set(S.SVC, { ...selItem, lastServiceOdo: svcOdo, conditionStatus: 'ok' });
      if (cost > 0) {
        const bal = await this.db.cfg('balance');
        await this.db.setCfg('balance', bal - cost);
        await this.db.add(S.TX, { amount: cost, type: 'expense', category: 'Авто', comment: label + (comment ? ' · ' + comment : ''), date: new Date(dt + 'T12:00:00').toISOString() });
      }
      this._render();
    };

    // ── Журнал обслуживания ──
    const logs = (await this.db.all(S.GARAGE)).sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 15);
    const jc = this._card();
    jc.innerHTML = '<div class="card-title">Журнал обслуживания</div>';
    if (!logs.length) {
      jc.insertAdjacentHTML('beforeend', '<div style="color:var(--muted);text-align:center;padding:16px">Нет записей</div>');
    } else {
      logs.forEach(log => {
        const row = document.createElement('div'); row.className = 'log-row';
        const del = document.createElement('button'); del.className = 'del-btn'; del.textContent = '×';
        row.innerHTML = `
          <div style="min-width:0;flex:1"><span class="badge">${log.label}</span><div class="log-meta">${dStr(log.date)} · ${fmtI(log.odometer)} км${log.comment ? ' · ' + log.comment : ''}</div></div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">${log.cost ? `<span style="color:var(--orange);font-size:12px;font-weight:700">−${fmt(log.cost)} ₽</span>` : ''}</div>
        `;
        row.querySelector('div:last-child').appendChild(del);
        del.onclick = () => confirmDel(del, async () => {
          del._ok = true;
          await this.db.del(S.GARAGE, log.id);
          if (log.cost > 0) {
            const bal = await this.db.cfg('balance');
            await this.db.setCfg('balance', bal + log.cost);
          }
          this._render();
        });
        jc.appendChild(row);
      });
    }
    c.appendChild(jc);

    // ── Артикулы и заметки ──
    const ac = this._card();
    ac.innerHTML = `
      <div class="card-title">Артикулы и заметки</div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:8px">Запиши артикулы масла, фильтров, свечей — чтобы не гуглить перед ТО</div>
      <textarea id="parts-n" placeholder="Масло: Castrol 5W-30&#10;Фильтр: MANN W712/75&#10;Свечи: NGK BPR5E&#10;...">${partsNotes || ''}</textarea>
      <button class="btn c full" id="parts-s">Сохранить</button>
    `;
    c.appendChild(ac);
    ac.querySelector('#parts-s').onclick = async () => {
      await this.db.setCfg('carPartsNotes', ac.querySelector('#parts-n').value);
      const f = document.createElement('div'); f.textContent = '✓ Сохранено'; f.style.cssText = 'color:var(--green);font-size:11px;margin-top:6px';
      ac.appendChild(f); setTimeout(() => f.remove(), 2000);
    };
  }

  /* ═══════ 3D PRINT ═══════ */
  async _print(c){
    const hr=await this.db.cfg('printHourRate');
    const sf=await this.db.cfg('printSetupFee');
    const mp=await this.db.cfg('printMinPrice');

    const paramCard=this._card();
    paramCard.innerHTML=`<div class="card-title">Параметры расчёта</div>
      <div class="g3">
        <div class="ig"><label class="lbl">₽/ч работы</label><input type="number" id="pr-r" value="${hr}"></div>
        <div class="ig"><label class="lbl">Подготовка (₽)</label><input type="number" id="pr-f" value="${sf}"></div>
        <div class="ig"><label class="lbl">Минималка (₽)</label><input type="number" id="pr-m" value="${mp}"></div>
      </div>
      <button class="btn v full" id="pr-save">Сохранить</button>`;
    c.appendChild(paramCard);
    paramCard.querySelector('#pr-save').onclick=async()=>{
      await this.db.setCfg('printHourRate',parseFloat(paramCard.querySelector('#pr-r').value)||hr);
      await this.db.setCfg('printSetupFee',parseFloat(paramCard.querySelector('#pr-f').value)||sf);
      await this.db.setCfg('printMinPrice',parseFloat(paramCard.querySelector('#pr-m').value)||mp);
      const f=document.createElement('div');f.textContent='✓ Сохранено';f.style.cssText='color:var(--green);font-size:11px;margin-top:6px';paramCard.appendChild(f);
      setTimeout(()=>f.remove(),700);
    };

    const cc=this._card();
    cc.innerHTML=`<div class="card-title">Калькулятор заказа</div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:10px;line-height:1.6">≤50г: Вес×коэф | >50г стандарт: (Ч×${hr})+(Вес×5)+${sf} | TPU: +Вес×10 | Композит: +Вес×20</div>
      <div class="ig"><label class="lbl">Тип материала</label>
        <select id="c-mat"><option value="standard">PLA / PETG / ABS — Стандарт</option><option value="flex">TPU / Flex — Гибкий</option><option value="composite">Carbon / Glass — Композит</option></select>
      </div>
      <div class="g2">
        <div class="ig"><label class="lbl">Вес модели (г)</label><input type="number" id="c-wg" placeholder="150"></div>
        <div class="ig"><label class="lbl">Время печати (ч)</label><input type="number" id="c-th" placeholder="4.5"></div>
      </div>
      <div class="ig"><label class="lbl">Название заказа</label><input type="text" id="c-desc" placeholder="Описание детали"></div>
      <button class="btn c full" id="c-calc">Рассчитать цену</button>
      <div id="c-res" style="display:none;margin-top:12px"></div>`;
    c.appendChild(cc);
    let lastTotal=0;
    cc.querySelector('#c-calc').onclick=()=>{
      const wg=parseFloat(cc.querySelector('#c-wg').value);
      const th=parseFloat(cc.querySelector('#c-th').value)||0;
      const mat=cc.querySelector('#c-mat').value;
      const res=cc.querySelector('#c-res'); res.style.display='block';
      if(!wg||wg<=0){res.innerHTML='<div style="color:var(--red)">Введи вес модели</div>';return;}
      if(wg>50&&th<=0){res.innerHTML='<div style="color:var(--orange)">Для >50г укажи время из слайсера</div>';return;}
      const {price,formula,breakdown}=calc3DPrice(wg,th,mat,hr,sf,mp);
      lastTotal=price;
      res.innerHTML=`<div class="calc-result">
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px">${wg}г${th?' · '+th+'ч':''} · формула: ${formula}</div>
        ${breakdown.map(b=>`<div>${b}</div>`).join('')}
        <div class="calc-total">Итого: ${fmt(price)} ₽</div>
      </div>
      <button class="btn g full" id="c-inc">→ Зачислить как доход</button>`;
      res.querySelector('#c-inc').onclick=async()=>{
        if(lastTotal<=0) return;
        const desc=cc.querySelector('#c-desc').value.trim()||'3D-печать';
        await this.db.add(S.TX,{amount:lastTotal,type:'income',category:'3D-печать',comment:`${desc} · ${wg}г${th?' · '+th+'ч':''}`,date:new Date().toISOString()});
        const bal=await this.db.cfg('balance');
        await this.db.setCfg('balance',bal+lastTotal);
        res.insertAdjacentHTML('beforeend',`<div style="color:var(--green);font-size:11px;margin-top:8px">✓ ${fmt(lastTotal)} ₽ добавлено в баланс</div>`);
        res.querySelector('#c-inc').disabled=true; lastTotal=0;
      };
    };

    const pTxs=(await this.db.all(S.TX)).filter(t=>t.category==='3D-печать'&&t.type==='income').sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,12);
    const hc=this._card();
    hc.innerHTML='<div class="card-title">История заказов</div>';
    if(!pTxs.length){hc.insertAdjacentHTML('beforeend','<div style="color:var(--muted);text-align:center;padding:16px">Нет заказов</div>');}
    else pTxs.forEach(t=>{
      const row=document.createElement('div'); row.className='log-row';
      const del=document.createElement('button'); del.className='del-btn'; del.textContent='×';
      row.innerHTML=`<div style="min-width:0;flex:1"><div style="font-size:11px">${t.comment||'—'}</div><div class="log-meta">${dStr(t.date)}</div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span class="amt i">+${fmt(t.amount)} ₽</span></div>`;
      row.querySelector('div:last-child').appendChild(del);
      del.onclick=()=>confirmDel(del,async()=>{del._ok=true;await this.db.del(S.TX,t.id);const bal=await this.db.cfg('balance');await this.db.setCfg('balance',bal-t.amount);this._render();});
      hc.appendChild(row);
    });
    c.appendChild(hc);
  }

  /* ═══════ HUB ═══════ */
  async _hub(c){
    const txs=await this.db.all(S.TX);
    const odo=await this.db.cfg('currentOdometer');
    const items=await this.db.all(S.SVC);
    const goals=(await this.db.all(S.GOALS)).filter(g=>g.active);
    const balance=await this.db.cfg('balance');
    const budgetCap=await this.db.cfg('monthlyBudgetCap');
    const mandatory=await this.db.cfg('mandatoryPayments');
    const now=new Date(), todayStr=today();
    const mStart=new Date(now.getFullYear(),now.getMonth(),1);
    const isGoal=t=>t.type==='expense'&&(t.category==='Цель'||(t.category==='Цель/Долг'&&goals.some(g=>g.name===t.comment)));
    const spentMonth=txs.filter(t=>t.type==='expense'&&new Date(t.date)>=mStart&&!isGoal(t)).reduce((s,t)=>s+t.amount,0);
    const todaySpent=txs.filter(t=>t.type==='expense'&&t.date.startsWith(todayStr)&&!isGoal(t)).reduce((s,t)=>s+t.amount,0);
    const payday=calcNextPayday(txs);
    const budRem=Math.max(0,budgetCap-(spentMonth-todaySpent));
    const dInM=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    const dRem=Math.max(1,dInM-now.getDate()+1);
    const maxBal=payday.days>0?Math.max(0,(balance-mandatory)/payday.days):0;
    const dailyBudget=Math.min(budRem/dRem,maxBal);
    const survRes=dailyBudget*payday.days;
    const freeCash=Math.max(0,balance-survRes-mandatory-1000);
    const lastExp=txs.filter(t=>t.type==='expense').sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    const daysSince=lastExp?Math.floor((now-new Date(lastExp.date))/86400000):999;
    const overdueItems=items.filter(it=>!isCondOnly(it)&&it.enabled!==false&&it.km>0&&(odo-it.lastServiceOdo)>=it.km);
    const critItems=items.filter(it=>isCondOnly(it)&&it.conditionStatus==='critical');

    // Reminders
    const remCard=this._card();
    remCard.innerHTML='<div class="card-title">Центр уведомлений</div>';
    let any=false;
    if(daysSince>=3){any=true;remCard.insertAdjacentHTML('beforeend',`<div class="reminder">📝 Последний расход: ${lastExp?dStr(lastExp.date):'давно'} (${daysSince} дн. назад). Что-то не записал?</div>`);}
    if(freeCash>500){any=true;remCard.insertAdjacentHTML('beforeend',`<div class="reminder">💰 Свободных денег: <b>${fmt(freeCash)} ₽</b> — можно на цели!</div>`);}
    if(overdueItems.length){any=true;remCard.insertAdjacentHTML('beforeend',`<div class="reminder red">🚗 Просрочено ТО: ${overdueItems.map(it=>it.label).join(', ')}</div>`);}
    if(critItems.length){any=true;remCard.insertAdjacentHTML('beforeend',`<div class="reminder red">⚠️ Критичное состояние: ${critItems.map(it=>it.label).join(', ')}</div>`);}
    goals.forEach(goal=>{
      const saved=txs.filter(t=>t.type==='expense'&&t.category==='Цель'&&t.comment===goal.name).reduce((s,t)=>s+t.amount,0);
      const dl=new Date(goal.deadline);
      const dL=Math.ceil((dl-now)/86400000);
      if(dL>0&&dL<14&&saved<goal.targetAmount){any=true;remCard.insertAdjacentHTML('beforeend',`<div class="reminder red">🎯 "${goal.name}" — ${dL} дн. до дедлайна! Накоплено ${fmt(saved)} из ${fmt(goal.targetAmount)}</div>`);}
    });
    if(!any) remCard.insertAdjacentHTML('beforeend','<div style="color:var(--green);font-size:12px;padding:8px 0">✅ Всё под контролем, Дима! Хорошая работа.</div>');
    c.appendChild(remCard);

    // Summary
    const sc=this._card();
    sc.innerHTML=`<div class="card-title">Сводка</div>
      <div class="g3">
        <div class="stat"><div class="v" style="color:${balance<0?'var(--red)':'var(--cyan)'}">${fmtI(balance)}</div><div class="l">Баланс ₽</div></div>
        <div class="stat"><div class="v" style="color:var(--violet)">${payday.days}</div><div class="l">Дн. до ${payday.label}</div></div>
        <div class="stat"><div class="v" style="color:${spentMonth>budgetCap?'var(--red)':'var(--orange)'}">${fmtI(spentMonth)}</div><div class="l">Потрачено ₽</div></div>
      </div>`;
    c.appendChild(sc);

    // Car tips
    const autoCard=this._card();
    autoCard.innerHTML='<div class="card-title">💡 Совет по Peugeot 206</div><div id="auto-tips"></div><button class="btn c full" id="ref-tips">🔄 Другой совет</button>';
    c.appendChild(autoCard);
    const showTips=()=>{
      const seed=Date.now();
      const t1=CAR_TIPS[seed%CAR_TIPS.length], t2=CAR_TIPS[(seed+7)%CAR_TIPS.length];
      autoCard.querySelector('#auto-tips').innerHTML=[t1,t2].map(t=>`<div class="tip">${t}</div>`).join('');
    };
    autoCard.querySelector('#ref-tips').onclick=showTips; showTips();

    // Print tips
    const prCard=this._card();
    const sb=now.getDate()+now.getMonth()*31;
    prCard.innerHTML=`<div class="card-title">🖨 Совет по 3D-печати</div>
      <div class="tip">${PRINT_TIPS[sb%PRINT_TIPS.length]}</div>
      <div class="tip">${PRINT_TIPS[(sb+5)%PRINT_TIPS.length]}</div>`;
    c.appendChild(prCard);

    // Recipes
    const recCard=this._card();
    recCard.innerHTML=`<div class="card-title">🍳 Быстрые рецепты</div>
      <div class="search-row">
        <select id="rec-cat"><option value="">Все</option><option value="Завтрак">Завтрак</option><option value="Обед">Обед</option><option value="Ужин">Ужин</option><option value="Перекус">Перекус</option></select>
        <input type="text" id="rec-q" placeholder="Поиск...">
      </div>
      <div id="rec-list"></div>`;
    c.appendChild(recCard);
    const renderRec=()=>{
      const cat=recCard.querySelector('#rec-cat').value;
      const q=recCard.querySelector('#rec-q').value.toLowerCase();
      let fil=RECIPES;
      if(cat) fil=fil.filter(r=>r.cat===cat);
      if(q) fil=fil.filter(r=>r.name.toLowerCase().includes(q));
      const list=recCard.querySelector('#rec-list'); list.innerHTML='';
      if(!fil.length){list.innerHTML='<div style="color:var(--muted);text-align:center;padding:16px">Нет рецептов</div>';return;}
      fil.forEach((rec,idx)=>{
        const rd=document.createElement('div'); rd.className='recipe';
        rd.innerHTML=`<div class="recipe-hd">
            <div><div class="recipe-name">${rec.name} <span style="font-size:9px;background:rgba(0,255,255,.1);color:var(--cyan);padding:1px 6px;border-radius:6px;margin-left:4px">${rec.cat}</span></div><div class="recipe-meta">⏱ ${rec.time} · 🔥 ${rec.cal}</div></div>
            <span style="color:var(--violet);font-size:20px;line-height:1">›</span>
          </div>
          <div class="recipe-body" id="rb-${idx}">
            ${rec.ingr?`<div class="rsec">Ингредиенты</div><ul>${rec.ingr.map(i=>`<li>${i}</li>`).join('')}</ul>`:''}
            <div class="rsec">Приготовление</div>
            <ol>${(rec.steps||rec.seps||[]).map(s=>`<li>${s}</li>`).join('')}</ol>
          </div>`;
        const body=rd.querySelector(`#rb-${idx}`); const arr=rd.querySelector('span:last-child');
        rd.onclick=()=>{body.classList.toggle('open');arr.textContent=body.classList.contains('open')?'‹':'›';};
        list.appendChild(rd);
      });
    };
    renderRec();
    recCard.querySelector('#rec-cat').onchange=renderRec;
    recCard.querySelector('#rec-q').oninput=renderRec;
  }

  /* ═══════ STATS ═══════ */
  async _stats(c){
    const txs=await this.db.all(S.TX);
    const now=new Date();
    if(!this.statsStart){
      const s=new Date(now);s.setDate(now.getDate()-30);
      this.statsStart=s.toISOString().split('T')[0];
      this.statsEnd=now.toISOString().split('T')[0];
    }

    // Period selector
    const pCard=this._card();
    pCard.innerHTML=`<div class="card-title">Период анализа</div>
      <div class="g2" style="margin-bottom:10px">
        <div class="ig"><label class="lbl">От</label><input type="date" id="as" value="${this.statsStart}"></div>
        <div class="ig"><label class="lbl">До</label><input type="date" id="ae" value="${this.statsEnd}"></div>
      </div>
      <button class="btn c" id="ap">Применить</button>
      <div class="btn-row" style="margin-top:8px">
        <button class="btn v" id="qt">Сегодня</button>
        <button class="btn v" id="qm">Месяц</button>
        <button class="btn v" id="qy">Год</button>
        <button class="btn v" id="qa">Всё время</button>
      </div>`;
    c.appendChild(pCard);
    const upd=(s,e)=>{this.statsStart=s;this.statsEnd=e;this._render();};
    pCard.querySelector('#ap').onclick=()=>{const s=pCard.querySelector('#as').value,e=pCard.querySelector('#ae').value;if(s&&e&&s<=e)upd(s,e);};
    pCard.querySelector('#qt').onclick=()=>{const t=today();upd(t,t);};
    pCard.querySelector('#qm').onclick=()=>upd(new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0],new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0]);
    pCard.querySelector('#qy').onclick=()=>upd(`${now.getFullYear()}-01-01`,`${now.getFullYear()}-12-31`);
    pCard.querySelector('#qa').onclick=()=>{
      if(!txs.length){upd(today(),today());return;}
      const sorted=[...txs].sort((a,b)=>new Date(a.date)-new Date(b.date));
      upd(sorted[0].date.split('T')[0], today());
    };

    const s0=new Date(this.statsStart), e0=new Date(this.statsEnd); e0.setHours(23,59,59,999);
    const pTxs=txs.filter(t=>{const d=new Date(t.date);return d>=s0&&d<=e0;});
    const totalInc=pTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const totalExp=pTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const saldo=totalInc-totalExp;

    // Summary
    const sumCard=this._card();
    sumCard.innerHTML=`<div class="card-title">${this.statsStart} — ${this.statsEnd}</div>
      <div class="g3">
        <div class="stat"><div class="v" style="color:var(--green)">+${fmtI(totalInc)}</div><div class="l">Доходы ₽</div></div>
        <div class="stat"><div class="v" style="color:var(--red)">−${fmtI(totalExp)}</div><div class="l">Расходы ₽</div></div>
        <div class="stat"><div class="v" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${saldo>=0?'+':''}${fmtI(saldo)}</div><div class="l">Сальдо ₽</div></div>
      </div>`;
    c.appendChild(sumCard);

    // Monthly bar chart
    const monthlyData={};
    txs.forEach(t=>{
      const d=new Date(t.date);
      const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if(!monthlyData[key]) monthlyData[key]={inc:0,exp:0};
      if(t.type==='income') monthlyData[key].inc+=t.amount;
      else monthlyData[key].exp+=t.amount;
    });
    const months=Object.keys(monthlyData).sort().slice(-9);
    if(months.length>0){
      const barCard=this._card();
      barCard.innerHTML='<div class="card-title">Доходы vs Расходы по месяцам</div>';
      const maxVal=Math.max(...months.map(m=>Math.max(monthlyData[m].inc,monthlyData[m].exp)),1);
      const barLeg=`<div class="bar-legend"><span><div class="dot" style="background:rgba(0,255,136,.7)"></div>Доходы</span><span><div class="dot" style="background:rgba(255,77,77,.7)"></div>Расходы</span></div>`;
      let barsHtml='<div class="bar-chart">';
      months.forEach(m=>{
        const d=monthlyData[m];
        const iw=Math.round((d.inc/maxVal)*100);
        const ew=Math.round((d.exp/maxVal)*100);
        const lbl=m.substring(5)+'/'+m.substring(2,4);
        barsHtml+=`<div class="bar-row">
          <div class="bar-label">${lbl}</div>
          <div style="flex:1">
            <div class="bar-track"><div class="bar-inc" style="width:${iw}%"></div></div>
            <div class="bar-track" style="margin-top:2px"><div class="bar-exp" style="width:${ew}%"></div></div>
          </div>
          <div class="bar-val" style="text-align:right">
            <div style="color:rgba(0,255,136,.8);font-size:9px">+${fmtI(Math.round(d.inc))}</div>
            <div style="color:rgba(255,77,77,.8);font-size:9px">−${fmtI(Math.round(d.exp))}</div>
          </div>
        </div>`;
      });
      barsHtml+='</div>';
      barCard.insertAdjacentHTML('beforeend',barLeg+barsHtml);
      c.appendChild(barCard);
    }

    // Expense pie chart
    const expByCat={};
    pTxs.filter(t=>t.type==='expense').forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+t.amount;});
    const cats=Object.keys(expByCat).sort((a,b)=>expByCat[b]-expByCat[a]);
    const vals=cats.map(k=>expByCat[k]);
    const totalE=vals.reduce((s,v)=>s+v,0)||1;
    const COLORS=['#0ff','#9b4dff','#0f8','#ff5555','#ffa040','#38c8f0','#f06dff','#ffeb40','#ff9b4d'];

    const pieCard=this._card();
    pieCard.innerHTML='<div class="card-title">Расходы по категориям</div>';
    if(!cats.length){
      pieCard.insertAdjacentHTML('beforeend','<div style="color:var(--muted);text-align:center;padding:16px">Нет расходов за период</div>');
    } else {
      const wrap=document.createElement('div'); wrap.className='canvas-wrap';
      const canvas=document.createElement('canvas'); canvas.width=420; canvas.height=220;
      wrap.appendChild(canvas); pieCard.appendChild(wrap);
      // Legend (ALL labels here, none on chart)
      const leg=document.createElement('div'); leg.className='chart-legend';
      cats.forEach((cat,i)=>{
        leg.insertAdjacentHTML('beforeend',`<span><span class="ld" style="background:${COLORS[i%COLORS.length]}"></span>${cat}: ${fmt(vals[i])} ₽ (${((vals[i]/totalE)*100).toFixed(1)}%)</span>`);
      });
      pieCard.appendChild(leg);
      requestAnimationFrame(()=>{
        const ctx=canvas.getContext('2d');
        const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2;
        const R=Math.min(cx,cy)-8;
        let a=-Math.PI/2; ctx.clearRect(0,0,W,H);
        vals.forEach((v,i)=>{
          const sw=(v/totalE)*2*Math.PI;
          ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,a,a+sw);ctx.closePath();
          ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();
          ctx.strokeStyle='rgba(8,8,14,.7)';ctx.lineWidth=2;ctx.stroke();
          a+=sw;
        });
        // Donut hole
        ctx.beginPath();ctx.arc(cx,cy,R*.46,0,2*Math.PI);
        ctx.fillStyle='rgba(8,8,14,.95)';ctx.fill();
        // Center text — larger font, clear position
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='#0ff';ctx.font=`bold 13px Segoe UI,sans-serif`;
        ctx.fillText(fmtI(Math.round(totalE))+' ₽',cx,cy-8);
        ctx.fillStyle='rgba(160,180,200,.6)';ctx.font=`11px Segoe UI,sans-serif`;
        ctx.fillText('расходы',cx,cy+10);
      });
    }
    c.appendChild(pieCard);

    // Income pie
    const incByCat={};
    pTxs.filter(t=>t.type==='income').forEach(t=>{incByCat[t.category]=(incByCat[t.category]||0)+t.amount;});
    const incCats=Object.keys(incByCat).sort((a,b)=>incByCat[b]-incByCat[a]);
    if(incCats.length){
      const incCard=this._card();
      incCard.innerHTML='<div class="card-title">Доходы по источникам</div>';
      const wrap2=document.createElement('div'); wrap2.className='canvas-wrap';
      const cv2=document.createElement('canvas'); cv2.width=420; cv2.height=200;
      wrap2.appendChild(cv2); incCard.appendChild(wrap2);
      const leg2=document.createElement('div'); leg2.className='chart-legend';
      const totalI=incCats.reduce((s,k)=>s+incByCat[k],0)||1;
      const ICOLORS=['#0f8','#22d4a4','#38f8b0','#0ea5e9','#34d399','#6ee7b7','#10b981','#059669'];
      incCats.forEach((cat,i)=>{leg2.insertAdjacentHTML('beforeend',`<span><span class="ld" style="background:${ICOLORS[i%ICOLORS.length]}"></span>${cat}: ${fmt(incByCat[cat])} ₽ (${((incByCat[cat]/totalI)*100).toFixed(1)}%)</span>`);});
      incCard.appendChild(leg2);
      requestAnimationFrame(()=>{
        const ctx=cv2.getContext('2d');
        const W=cv2.width,H=cv2.height,cx=W/2,cy=H/2,R=Math.min(cx,cy)-8;
        let a=-Math.PI/2; ctx.clearRect(0,0,W,H);
        incCats.forEach((cat,i)=>{
          const sw=(incByCat[cat]/totalI)*2*Math.PI;
          ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,a,a+sw);ctx.closePath();
          ctx.fillStyle=ICOLORS[i%ICOLORS.length];ctx.fill();
          ctx.strokeStyle='rgba(8,8,14,.7)';ctx.lineWidth=2;ctx.stroke();
          a+=sw;
        });
        ctx.beginPath();ctx.arc(cx,cy,R*.46,0,2*Math.PI);ctx.fillStyle='rgba(8,8,14,.95)';ctx.fill();
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='#0f8';ctx.font='bold 13px Segoe UI,sans-serif';
        ctx.fillText(fmtI(Math.round(totalI))+' ₽',cx,cy-8);
        ctx.fillStyle='rgba(160,180,200,.6)';ctx.font='11px Segoe UI,sans-serif';
        ctx.fillText('доходы',cx,cy+10);
      });
      c.appendChild(incCard);
    }

    // Balance line chart
    const sorted=[...pTxs].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const pts=[]; let run=0;
    sorted.forEach(t=>{run=t.type==='income'?run+t.amount:run-t.amount;pts.push(run);});
    if(pts.length>=2){
      const lineCard=this._card();
      lineCard.innerHTML='<div class="card-title">Динамика баланса за период</div>';
      const lw=document.createElement('div'); lw.className='canvas-wrap';
      const lc=document.createElement('canvas'); lc.width=420; lc.height=130;
      lw.appendChild(lc); lineCard.appendChild(lw);
      c.appendChild(lineCard);
      requestAnimationFrame(()=>{
        const ctx=lc.getContext('2d'),W=lc.width,H=lc.height,n=pts.length;
        const minY=Math.min(...pts),maxY=Math.max(...pts),rng=maxY-minY||1;
        const px=14,py=16;
        const toX=i=>px+(i/(n-1))*(W-px*2);
        const toY=v=>H-py-((v-minY)/rng)*(H-py*2);
        ctx.clearRect(0,0,W,H);
        const gr=ctx.createLinearGradient(0,0,0,H);gr.addColorStop(0,'rgba(0,255,255,.15)');gr.addColorStop(1,'rgba(0,255,255,0)');
        ctx.beginPath();ctx.moveTo(toX(0),toY(pts[0]));pts.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
        ctx.lineTo(toX(n-1),H);ctx.lineTo(toX(0),H);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
        ctx.beginPath();ctx.strokeStyle='#0ff';ctx.lineWidth=2;ctx.lineJoin='round';
        pts.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));ctx.stroke();
        pts.forEach((v,i)=>{ctx.beginPath();ctx.arc(toX(i),toY(v),2.5,0,2*Math.PI);ctx.fillStyle='#0ff';ctx.fill();});
        // Labels: top-left and bottom-left to avoid overlap with the line
        ctx.fillStyle='rgba(160,180,200,.7)';ctx.font='10px Segoe UI,sans-serif';
        ctx.textAlign='left';
        ctx.textBaseline='top'; ctx.fillText('↑ '+fmt(maxY)+' ₽', 4, 2);
        ctx.textBaseline='bottom'; ctx.fillText('↓ '+fmt(minY)+' ₽', 4, H-2);
      });
    }
  }

  /* ═══════ EXPORT / IMPORT ═══════ */
  async _export(){
    const data={version:5,exportedAt:new Date().toISOString(),
      transactions:await this.db.all(S.TX),garage_logs:await this.db.all(S.GARAGE),
      odo_history:await this.db.all(S.ODO),service_items:await this.db.all(S.SVC),
      goals:await this.db.all(S.GOALS),settings:await this.db.all(S.CFG)};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`sentinel-backup-${today()}.json`;
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  }
  async _import(file){
    if(!file) return;
    const text=await file.text();
    let data; try{data=JSON.parse(text);}catch{alert('Неверный формат файла');return;}
    if(!confirm(`Загрузить резервную копию от ${data.exportedAt||'?'}?\nВсе текущие данные будут заменены!`)) return;
    const map={transactions:S.TX,garage_logs:S.GARAGE,odo_history:S.ODO,service_items:S.SVC,goals:S.GOALS,settings:S.CFG};
    for(const [key,sn] of Object.entries(map)){
      if(!data[key]) continue;
      const ex=await this.db.all(sn);
      for(const r of ex) await this.db.del(sn,r.id||r.key);
      for(const r of data[key]) await this.db.set(sn,r);
    }
    this._render();
  }
}

new App();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
